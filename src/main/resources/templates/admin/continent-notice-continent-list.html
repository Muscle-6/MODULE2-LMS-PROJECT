<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대륙 공지 작성 | ADMIN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --secondary: #64748b;
      --bg-body: #f8fafc;
      --bg-sidebar: #1e293b;
      --white: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background: var(--bg-body);
      margin: 0;
      display: flex;
      min-height: 100vh;
      color: var(--text-main);
    }

    /* --- Sidebar --- */
    aside {
      width: 260px;
      background: var(--bg-sidebar);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 30px 24px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-menu {
      flex: 1;
      padding: 20px 12px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.1rem;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-item.logout {
      margin-top: 20px;
      color: #fca5a5;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 20px;
    }

    /* --- Main Content --- */
    main {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .breadcrumb {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .container {
      padding: 40px;
      max-width: 1200px;
    }

    /* --- Page Info --- */
    .page-header {
      margin-bottom: 32px;
    }

    .page-header h2 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .page-description {
      background: #eff6ff;
      border-left: 4px solid var(--primary);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      margin-top: 16px;
      color: #1e40af;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* --- Continent Special Grid --- */
    .continent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .continent-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px 24px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* 도트 패턴 배경 */
    .continent-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 16px 16px;
      opacity: 0.3;
      z-index: -1;
    }

    /* 우측 하단 대형 워터마크 아이콘 */
    .continent-card .bg-icon {
      position: absolute;
      right: -24px;
      bottom: -24px;
      font-size: 8rem;
      color: #f1f5f9;
      z-index: -1;
      transform: rotate(-15deg);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
    }

    .continent-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.15);
      border-color: var(--primary);
    }

    .continent-card:hover .bg-icon {
      transform: rotate(0deg) scale(1.1);
      color: #e0e7ff; /* Hover 시 은은한 프라이머리 컬러 톤으로 변경 */
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .continent-card h3 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--text-main);
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .continent-card p {
      margin: 0 0 24px 0;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex-grow: 1;
      background: rgba(255, 255, 255, 0.8); /* 텍스트 가독성을 위한 반투명 배경 */
      padding: 8px 0;
      border-radius: 8px;
    }

    .btn-go {
      text-decoration: none;
      background: var(--bg-body);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid #e0e7ff;
      transition: all 0.2s;
    }

    .btn-go:hover {
      background: var(--primary);
      color: white;
      gap: 12px;
      border-color: var(--primary);
    }

    /* --- Empty State --- */
    .empty-state {
      background: var(--white);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      color: #cbd5e1;
      margin-bottom: 16px;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      aside { width: 80px; }
      aside .sidebar-header span, aside .nav-item span { display: none; }
      main { margin-left: 80px; }
      .sidebar-header { justify-content: center; padding: 20px 0; }
      .nav-item { justify-content: center; }
    }

    @media (max-width: 640px) {
      main { margin-left: 0; }
      aside { transform: translateX(-100%); }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <i class="fa-solid fa-shield-halved"></i>
    <span>ADMIN PANEL</span>
  </div>
  <nav class="sidebar-menu">
    <a th:href="@{/admin}" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>대시보드 홈</span>
    </a>
    <a th:href="@{/admin/members}" class="nav-item">
      <i class="fa-solid fa-users"></i>
      <span>회원/계정 관리</span>
    </a>
    <a th:href="@{/admin/instructors/new}" class="nav-item">
      <i class="fa-solid fa-user-plus"></i>
      <span>강사 계정 생성</span>
    </a>
    <a th:href="@{/admin/reports}" class="nav-item">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>게시판/신고 관리</span>
    </a>
    <a th:href="@{/admin/statics}" class="nav-item">
      <i class="fa-solid fa-chart-line"></i>
      <span>통계/모니터링</span>
    </a>
    <a th:href="@{/admin/refunds}" class="nav-item">
      <i class="fa-solid fa-receipt"></i>
      <span>환불 요청 관리</span>
    </a>
    <a th:href="@{/admin/courses}" class="nav-item">
      <i class="fa-solid fa-book-open"></i>
      <span>강좌 신청 관리</span>
    </a>
    <a th:href="@{/admin/continent-notices}" class="nav-item active">
      <i class="fa-solid fa-bullhorn"></i>
      <span>대륙 공지 작성</span>
    </a>
    <a th:href="@{/logout}" class="nav-item logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      <span>로그아웃</span>
    </a>
  </nav>
</aside>

<main>
  <header>
    <div class="breadcrumb">Admin &gt; <span style="color: var(--text-main); font-weight: 600;">Continent Notices</span></div>
    <div class="top-links">
      <a th:href="@{/}" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem;">
        <i class="fa-solid fa-globe"></i> 사이트 바로가기
      </a>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h2>대륙 공지 작성</h2>
      <div class="page-description">
        <i class="fa-solid fa-map-location-dot"></i>
        관리자가 공지글을 작성·수정·삭제할 대륙을 선택합니다. 각 지도를 클릭하여 해당 대륙의 통제실로 진입하세요.
      </div>
    </div>

    <div th:if="${#lists.isEmpty(continents)}" class="empty-state">
      <i class="fa-solid fa-map"></i>
      <h3>개척된 대륙이 없습니다</h3>
      <p>현재 시스템에 등록된 대륙 정보가 존재하지 않습니다.</p>
    </div>

    <div class="continent-grid" th:if="${!#lists.isEmpty(continents)}">
      <div class="continent-card" th:each="continent : ${continents}">
        <i class="fa-solid fa-globe bg-icon"></i>

        <div class="card-header">
          <div class="icon-circle"><i class="fa-solid fa-map-pin"></i></div>
          <h3 th:text="${continent.continentName}">대륙명</h3>
        </div>

        <p th:text="${continent.description != null and !#strings.isEmpty(continent.description)} ? ${continent.description} : '설명이 등록되지 않은 미지의 대륙입니다.'">
          대륙 설명
        </p>

        <a th:href="@{/admin/continent-notices(continentId=${continent.continentId})}" class="btn-go">
          공지 관리실 진입 <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>
    </div>

  </div>
</main>
</body>
</html>
