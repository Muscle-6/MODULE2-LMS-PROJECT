<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>대륙 공지 작성 | ADMIN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      margin: 0;
      color: #222;
    }

    header {
      background: #2f3241;
      color: white;
      padding: 20px 32px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin-right: 14px;
      font-size: 14px;
    }

    .container {
      width: 1100px;
      max-width: calc(100% - 40px);
      margin: 30px auto;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    .panel h2 {
      margin-top: 0;
    }

    .continent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .continent-card {
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      padding: 18px;
      background: #fafbfd;
    }

    .continent-card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .desc {
      min-height: 60px;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3a1f44;
      color: white;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
    }

    .btn-secondary {
      background: #6b7280;
    }

    .empty {
      color: #666;
      padding: 16px 0;
    }
  </style>
</head>
<body>
<header>
  <h1>ADMIN PANEL</h1>
  <nav>
    <a th:href="@{/admin}">대시보드 홈</a>
    <a th:href="@{/admin/members}">회원/계정 관리</a>
    <a th:href="@{/admin/reports}">게시판/신고 관리</a>
    <a th:href="@{/admin/refunds}">환불 요청 관리</a>
    <a th:href="@{/admin/courses}">강좌 신청 관리</a>
    <a th:href="@{/admin/continent-notices}">대륙 공지 작성</a>
    <a th:href="@{/logout}">로그아웃</a>
  </nav>
</header>

<div class="container">
  <div class="panel">
    <h2>대륙 선택</h2>
    <p>관리자가 공지글을 작성·수정·삭제할 대륙을 선택합니다.</p>
  </div>

  <div class="panel">
    <div th:if="${#lists.isEmpty(continents)}" class="empty">
      조회 가능한 대륙이 없습니다.
    </div>

    <div class="continent-grid" th:if="${!#lists.isEmpty(continents)}">
      <div class="continent-card" th:each="continent : ${continents}">
        <h3 th:text="${continent.continentName}">대륙명</h3>
        <p class="desc"
           th:text="${continent.description != null and !#strings.isEmpty(continent.description)} ? ${continent.description} : '설명이 등록되지 않은 대륙입니다.'">
          대륙 설명
        </p>

        <a th:href="@{/admin/continent-notices(continentId=${continent.continentId})}" class="btn">
          공지 관리 들어가기
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
