<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 강좌 관리</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f8fb;
            color: #222;
        }

        header {
            background: #3a1f44;
            color: white;
            padding: 22px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 8px 0 0;
            color: #e9ddf0;
            font-size: 14px;
        }

        .container {
            width: 1180px;
            max-width: calc(100% - 40px);
            margin: 30px auto 50px;
        }

        .page-card,
        .search-card,
        .table-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            padding: 24px;
            margin-bottom: 20px;
        }

        .page-card h2,
        .search-card h3 {
            margin-top: 0;
        }

        .guide-text {
            color: #555;
            line-height: 1.6;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .alert-success {
            background: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .search-form input,
        .search-form select {
            height: 44px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 14px;
            background: white;
        }

        .search-form input {
            flex: 1 1 320px;
            min-width: 240px;
        }

        .search-form select {
            width: 180px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 18px;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: #5b2c6f;
            color: white;
        }

        .btn-primary:hover {
            background: #472257;
        }

        .btn-secondary {
            background: #eef1f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dde3ec;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .result-summary {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            color: #555;
            font-size: 14px;
        }

        .table-card {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
        }

        thead {
            background: #f2f4f8;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #eceff4;
            text-align: left;
            vertical-align: middle;
            font-size: 14px;
        }

        th {
            color: #444;
            font-size: 13px;
        }

        tr.row-draft {
            background: #fffaf0;
        }

        .title-main {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .muted {
            color: #777;
            font-size: 13px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 72px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-draft {
            background: #fff3cd;
            color: #8a5a00;
        }

        .status-published {
            background: #dcfce7;
            color: #166534;
        }

        .empty-box {
            padding: 50px 20px;
            text-align: center;
            color: #777;
            font-size: 15px;
        }

        .top-actions {
            margin-bottom: 14px;
        }

        .price-text {
            font-weight: 700;
        }

        @media (max-width: 768px) {
            header {
                padding: 18px 20px;
            }

            .container {
                max-width: calc(100% - 24px);
            }

            .search-form {
                flex-direction: column;
                align-items: stretch;
            }

            .search-form input,
            .search-form select,
            .search-form .btn,
            .top-actions .btn {
                width: 100%;
            }

            .result-summary {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>관리자 강좌 관리</h1>
    <p>강사 신청 강좌를 조회하고 공개 상태를 DRAFT / PUBLISHED로 변경합니다.</p>
</header>

<div class="container">
    <div class="page-card">
        <div class="top-actions">
            <a th:href="@{/admin}" class="btn btn-secondary">관리자 홈으로</a>
        </div>

        <h2>강좌 신청 목록</h2>
        <p class="guide-text">
            <strong>DRAFT 상태 강좌를 먼저</strong> 보여주고, 그 안에서 <strong>신청일 최신순</strong>으로 정렬합니다.<br>
            검색은 <strong>강좌명 / 강사명 / 대륙명</strong> 기준으로 동작합니다.
        </p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="search-card">
        <h3>검색 조건</h3>

        <form class="search-form" th:action="@{/admin/courses}" method="get">
            <input type="text"
                   name="query"
                   th:value="${condition.query}"
                   placeholder="강좌명, 강사명, 대륙명 검색">

            <select name="status">
                <option value="">전체 상태</option>
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:text="${status.displayName}"
                        th:selected="${condition.status == status}">
                </option>
            </select>

            <button type="submit" class="btn btn-primary">조회</button>
            <a th:href="@{/admin/courses}" class="btn btn-secondary">초기화</a>
        </form>

        <div class="result-summary">
            <div>
                조회 결과:
                <strong th:text="${#lists.size(courses)}">0</strong>건
            </div>
            <div class="muted">
                DRAFT 우선 정렬 후 신청일 최신순으로 표시됩니다.
            </div>
        </div>
    </div>

    <div class="table-card">
        <table th:if="${!#lists.isEmpty(courses)}">
            <thead>
            <tr>
                <th>강좌 정보</th>
                <th>강사</th>
                <th>대륙</th>
                <th>가격</th>
                <th>신청일</th>
                <th>현재 상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}"
                th:classappend="${course.draft} ? 'row-draft' : ''">
                <td>
                    <div class="title-main" th:text="${course.courseTitle}">강좌명</div>
                </td>

                <td th:text="${course.instructorName}">강사명</td>

                <td th:text="${course.continentName}">대륙명</td>

                <td>
                    <span class="price-text"
                          th:text="${#numbers.formatInteger(course.coursePrice, 3, 'COMMA') + '원'}">
                        0원
                    </span>
                </td>

                <td th:text="${#temporals.format(course.createdAt, 'yyyy-MM-dd HH:mm')}">
                    2026-04-16 10:00
                </td>

                <td>
                    <span class="status-badge"
                          th:classappend="${course.draft} ? ' status-draft' : ' status-published'"
                          th:text="${course.statusLabel}">
                        비공개
                    </span>
                </td>

                <td>
                    <form th:action="@{|/admin/courses/${course.courseId}/status|}"
                          method="post"
                          onsubmit="return confirm('강좌 공개 상태를 변경하시겠습니까?');">

                        <input type="hidden" name="targetStatus" th:value="${course.nextStatus}">
                        <input type="hidden" name="query" th:value="${condition.query}">
                        <input type="hidden" name="status"
                               th:if="${condition.status != null}"
                               th:value="${condition.status}">

                        <button type="submit"
                                class="btn"
                                th:classappend="${course.draft} ? ' btn-primary' : ' btn-warning'"
                                th:text="${course.actionLabel}">
                            공개 전환
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(courses)}" class="empty-box">
            조회된 강좌가 없습니다.
        </div>
    </div>
</div>
</body>
</html>
