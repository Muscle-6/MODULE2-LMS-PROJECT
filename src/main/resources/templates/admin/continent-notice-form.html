<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대륙 공지 폼 | ADMIN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --secondary: #64748b;
      --bg-body: #f8fafc;
      --bg-sidebar: #1e293b;
      --white: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --error-bg: #fef2f2;
      --error-text: #ef4444;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background: var(--bg-body);
      margin: 0;
      display: flex;
      min-height: 100vh;
      color: var(--text-main);
    }

    /* --- Sidebar (공통) --- */
    aside {
      width: 260px;
      background: var(--bg-sidebar);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 30px 24px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-menu {
      flex: 1;
      padding: 20px 12px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.1rem;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-item.logout {
      margin-top: 20px;
      color: #fca5a5;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 20px;
    }

    /* --- Main Content (공통) --- */
    main {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .breadcrumb {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .container {
      padding: 40px;
      max-width: 1000px; /* 폼 화면에 맞게 넓이 조정 */
    }

    /* --- Page Info --- */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h2 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .page-description {
      background: #eff6ff;
      border-left: 4px solid var(--primary);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      margin-top: 16px;
      color: #1e40af;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* --- Form UI --- */
    .form-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
      font-size: 0.95rem;
    }

    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text-main);
      transition: all 0.2s;
      background: #f8fafc;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    textarea {
      min-height: 300px;
      resize: vertical;
      line-height: 1.6;
    }

    .error-message {
      background: var(--error-bg);
      color: var(--error-text);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-error {
      color: var(--error-text);
      font-size: 0.85rem;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* --- Buttons --- */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      aside { width: 80px; }
      aside .sidebar-header span, aside .nav-item span { display: none; }
      main { margin-left: 80px; }
      .sidebar-header { justify-content: center; padding: 20px 0; }
      .nav-item { justify-content: center; }
      .container { padding: 24px; }
    }

    @media (max-width: 640px) {
      main { margin-left: 0; }
      aside { transform: translateX(-100%); }
      .form-card { padding: 24px; }
      .btn-group { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <i class="fa-solid fa-shield-halved"></i>
    <span>ADMIN PANEL</span>
  </div>
  <nav class="sidebar-menu">
    <a th:href="@{/admin}" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>대시보드 홈</span>
    </a>
    <a th:href="@{/admin/members}" class="nav-item">
      <i class="fa-solid fa-users"></i>
      <span>회원/계정 관리</span>
    </a>
    <a th:href="@{/admin/instructors/new}" class="nav-item">
      <i class="fa-solid fa-user-plus"></i>
      <span>강사 계정 생성</span>
    </a>
    <a th:href="@{/admin/reports}" class="nav-item">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>게시판/신고 관리</span>
    </a>
    <a th:href="@{/admin/statics}" class="nav-item">
      <i class="fa-solid fa-chart-line"></i>
      <span>통계/모니터링</span>
    </a>
    <a th:href="@{/admin/refunds}" class="nav-item">
      <i class="fa-solid fa-receipt"></i>
      <span>환불 요청 관리</span>
    </a>
    <a th:href="@{/admin/courses}" class="nav-item">
      <i class="fa-solid fa-book-open"></i>
      <span>강좌 신청 관리</span>
    </a>
    <a th:href="@{/admin/continent-notices}" class="nav-item active">
      <i class="fa-solid fa-bullhorn"></i>
      <span>대륙 공지 작성</span>
    </a>
    <a th:href="@{/logout}" class="nav-item logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      <span>로그아웃</span>
    </a>
  </nav>
</aside>

<main>
  <header>
    <div class="breadcrumb">Admin &gt; Continent Notices &gt; <span style="color: var(--text-main); font-weight: 600;" th:text="${mode == 'create'} ? 'Create' : 'Edit'">Form</span></div>
    <div class="top-links">
      <a th:href="@{/}" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem;">
        <i class="fa-solid fa-globe"></i> 사이트 바로가기
      </a>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h2>대륙 공지 <span th:text="${mode == 'create'} ? '등록' : '수정'">폼</span></h2>
      <div class="page-description">
        <i class="fa-solid fa-pen-to-square"></i>
        현재 <strong>[<span th:text="${continent.continentName}">대륙명</span>]</strong> 대륙의 공지사항을 <span th:text="${mode == 'create'} ? '작성' : '수정'"></span>하고 있습니다.
      </div>
    </div>

    <div class="form-card">
      <div th:if="${errorMessage}" class="error-message">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span th:text="${errorMessage}">에러 메시지</span>
      </div>

      <form th:if="${mode == 'create'}" th:action="@{/admin/continent-notices}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{postId}">
        <input type="hidden" th:field="*{continentId}">

        <div class="form-group">
          <label for="postTitleCreate">공지 제목</label>
          <input type="text" id="postTitleCreate" th:field="*{postTitle}" placeholder="공지 제목을 입력하세요.">
          <div class="field-error" th:if="${#fields.hasErrors('postTitle')}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:errors="*{postTitle}">제목 오류</span>
          </div>
        </div>

        <div class="form-group">
          <label for="postContentCreate">공지 내용</label>
          <textarea id="postContentCreate" th:field="*{postContent}" placeholder="공지 내용을 자세히 작성해 주세요."></textarea>
          <div class="field-error" th:if="${#fields.hasErrors('postContent')}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:errors="*{postContent}">내용 오류</span>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> 공지 등록</button>
          <a th:href="@{/admin/continent-notices(continentId=${continent.continentId})}" class="btn btn-secondary">취소 및 뒤로가기</a>
        </div>
      </form>

      <form th:if="${mode == 'edit'}" th:action="@{/admin/continent-notices/{postId}(postId=${form.postId})}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{postId}">
        <input type="hidden" th:field="*{continentId}">

        <div class="form-group">
          <label for="postTitleEdit">공지 제목</label>
          <input type="text" id="postTitleEdit" th:field="*{postTitle}" placeholder="공지 제목을 입력하세요.">
          <div class="field-error" th:if="${#fields.hasErrors('postTitle')}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:errors="*{postTitle}">제목 오류</span>
          </div>
        </div>

        <div class="form-group">
          <label for="postContentEdit">공지 내용</label>
          <textarea id="postContentEdit" th:field="*{postContent}" placeholder="공지 내용을 자세히 작성해 주세요."></textarea>
          <div class="field-error" th:if="${#fields.hasErrors('postContent')}">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:errors="*{postContent}">내용 오류</span>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> 변경사항 저장</button>
          <a th:href="@{/admin/continent-notices(continentId=${continent.continentId})}" class="btn btn-secondary">취소 및 뒤로가기</a>
        </div>
      </form>

    </div>
  </div>
</main>
</body>
</html>
