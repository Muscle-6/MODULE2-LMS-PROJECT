<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL RE-CONFIG | MODULE02 LMS</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "secondary": "#c97cff",
                        "surface-container": "#161a21",
                        "surface-container-high": "#1c2028",
                        "on-surface": "#ecedf6",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image: radial-gradient(circle at 50% 50%, rgba(153, 247, 255, 0.05) 0%, transparent 50%);
        }

        /* MODULE02 전용 통합 인풋 스타일 */
        .cyber-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(153, 247, 255, 0.1) !important;
            border-radius: 12px;
            padding: 12px 16px;
            color: #99f7ff !important;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .cyber-input:focus {
            outline: none;
            background: rgba(15, 23, 42, 0.9) !important;
            border-color: #99f7ff !important;
            box-shadow: 0 0 20px rgba(153, 247, 255, 0.15);
            color: #ffffff !important;
        }
        .cyber-input:disabled {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px dashed rgba(255, 255, 255, 0.05) !important;
            color: #4a5568 !important;
            cursor: not-allowed;
        }

        /* 프로필 이미지 글로우 효과 */
        .profile-scanner {
            position: relative;
            overflow: hidden;
        }
        .profile-scanner::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(153, 247, 255, 0.2), transparent);
            animation: scan 3s infinite linear;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }
    </style>
</head>

<body class="min-h-screen">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl shadow-[0_0_20px_rgba(153,247,255,0.1)]">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-bold tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(153,247,255,0.6)] font-headline">MODULE02 LMS</span>
        <span class="hidden md:inline text-xs font-label text-slate-400 tracking-widest uppercase">우주/외계인 세계관 학습 플랫폼</span>
    </div>

    <div class="flex items-center gap-4">
        <div class="flex items-center gap-4" th:if="${loginMember == null}">
            <a th:href="@{/login}" class="text-slate-300 hover:text-cyan-300 font-label text-xs tracking-widest transition-colors">로그인</a>
            <a th:href="@{/signup}" class="bg-primary/10 border border-primary/30 text-primary px-4 py-1.5 rounded text-xs font-label tracking-widest hover:bg-primary/20 transition-all shadow-[0_0_10px_rgba(153,247,255,0.1)]">회원가입</a>
        </div>

        <div class="flex items-center gap-4" th:if="${loginMember != null}">
            <div class="text-right hidden sm:block mr-2">
                <span class="text-xs font-label tracking-widest text-cyan-400" th:text="|${loginMember.name} 님|"></span>
                <span class="text-[10px] text-slate-500 font-label tracking-tight ml-1" th:text="|(${loginMember.role})|"></span>
            </div>
            <a th:href="@{/logout}" class="flex items-center gap-1 text-slate-400 hover:text-error transition-colors text-xs font-label">
                <span class="material-symbols-outlined text-sm">power_settings_new</span> 로그아웃
            </a>
        </div>
    </div>
</header>


<aside class="fixed left-0 top-16 bottom-0 flex flex-col z-40 bg-slate-950/80 backdrop-blur-lg w-64 border-r border-white/5">
    <nav class="flex-1 py-6">
        <a th:href="@{/instructor/profile}" class="flex items-center gap-4 text-slate-400 hover:text-cyan-400 hover:bg-cyan-400/5 py-3.5 px-6 transition-all font-label">
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="text-sm tracking-wide">Return to Intel</span>
        </a>
        <div class="flex items-center gap-4 text-cyan-400 bg-cyan-400/10 border-r-4 border-cyan-400 py-3.5 px-6 font-label">
            <span class="material-symbols-outlined">edit_square</span>
            <span class="text-sm tracking-wide tracking-widest">Re-Configure</span>
        </div>
    </nav>
    <div class="p-6 mt-auto">
        <div class="relative group cursor-help">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>

            <div class="relative w-full bg-slate-900/50 border border-white/10 p-4 rounded-xl">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[9px] font-label font-black text-slate-500 uppercase tracking-widest">Network Status</span>
                    <span class="flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                </div>

                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary text-sm animate-pulse">radar</span>
                    <div class="flex-1">
                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-primary w-[85%] shadow-[0_0_8px_#99f7ff]"></div>
                        </div>
                    </div>
                </div>
                <p class="mt-2 text-[9px] font-label text-primary/60 text-center uppercase tracking-[0.2em]">System Online</p>
            </div>
        </div>
    </div>
</aside>

<main class="ml-64 pt-32 px-10 pb-16">
    <div class="max-w-4xl mx-auto">

        <div class="mb-10">
            <div class="flex items-center gap-3 mb-2">
                <span class="h-[1px] w-8 bg-primary/40"></span>
                <span class="text-[10px] font-label tracking-[0.3em] text-primary uppercase">Identity Modification</span>
            </div>
            <h1 class="text-4xl font-headline font-black text-on-surface tracking-tighter uppercase italic leading-none">
                Update <span class="text-primary/50">Core Intel</span>
            </h1>
        </div>

        <form th:action="@{/instructor/profile/edit}" method="post" enctype="multipart/form-data">
            <div class="bg-surface-container/60 backdrop-blur-xl border border-white/5 p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>

                <div class="flex flex-col md:flex-row gap-12">

                    <div class="flex flex-col items-center gap-6">
                        <div class="group relative">
                            <div class="profile-scanner w-32 h-32 rounded-3xl bg-slate-950 border border-primary/20 p-1 shadow-[0_0_30px_rgba(153,247,255,0.1)] cursor-pointer"
                                 onclick="document.getElementById('profileImageFile').click()">
                                <img id="profilePreview" th:if="${user.profileImageUrl != null}" th:src="${user.profileImageUrl}"
                                     class="w-full h-full object-cover rounded-2xl transition-all group-hover:opacity-40"/>
                                <div id="profileDefault" th:classappend="${user.profileImageUrl != null} ? 'hidden' : 'flex'"
                                     class="w-full h-full items-center justify-center text-primary/20">
                                    <span class="material-symbols-outlined text-6xl">account_circle</span>
                                </div>
                                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="material-symbols-outlined text-primary text-3xl">upload_file</span>
                                </div>
                            </div>
                        </div>

                        <input type="file" id="profileImageFile" name="profileImageFile" accept="image/*" class="hidden" onchange="previewImage(event)"/>

                        <div class="text-center space-y-1">
                            <span class="px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-[10px] font-label font-bold text-primary tracking-widest uppercase"
                                  th:text="${user.role != null ? user.role.displayName : 'UNKNOWN'}">ROLE</span>
                            <p class="text-[9px] text-slate-600 font-label tracking-tighter uppercase pt-2">Click image to upload</p>
                        </div>
                    </div>

                    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="space-y-2">
                            <label class="text-[10px] font-label font-black text-slate-600 uppercase tracking-widest ml-1">Access ID (ReadOnly)</label>
                            <input type="text" class="cyber-input" th:value="${user.loginId}" disabled>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-label font-black text-primary/60 uppercase tracking-widest ml-1">Operative Name</label>
                            <input type="text" name="name" class="cyber-input" th:value="${user.name}" placeholder="Enter name">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-label font-black text-slate-500 uppercase tracking-widest ml-1">Comms Email</label>
                            <input type="email" name="email" class="cyber-input" th:value="${user.email}" placeholder="Enter email">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-label font-black text-primary/60 uppercase tracking-widest ml-1">Signal Line</label>
                            <input type="text" name="phone" class="cyber-input" th:value="${user.phone}" placeholder="Enter phone">
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="text-[10px] font-label font-black text-primary/60 uppercase tracking-widest ml-1">Biography / Intel Source</label>
                            <textarea name="introduction" rows="5" class="cyber-input resize-none" th:text="${user.introduction}" placeholder="Enter brief intel about yourself..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 mt-12 pt-8 border-t border-white/5">
                    <a th:href="@{/instructor/profile}"
                       class="px-8 py-3 rounded-xl text-[10px] font-label font-black text-slate-500 uppercase tracking-widest hover:text-white transition-all">
                        Discard
                    </a>
                    <button type="submit"
                            class="px-10 py-3 bg-primary text-slate-950 font-label text-[10px] font-black rounded-xl hover:bg-white hover:scale-105 active:scale-95 transition-all shadow-[0_0_25px_rgba(153,247,255,0.2)] uppercase tracking-widest flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm font-bold">save</span> Apply Changes
                    </button>
                </div>
            </div>
        </form>
    </div>
</main>

<script>
    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            const defaultIcon = document.getElementById('profileDefault');
            if (defaultIcon) defaultIcon.classList.add('hidden');
            if (defaultIcon) defaultIcon.classList.remove('flex');

            let preview = document.getElementById('profilePreview');
            if (preview) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
            } else {
                const img = document.createElement('img');
                img.id = 'profilePreview';
                img.src = e.target.result;
                img.className = 'w-full h-full object-cover rounded-2xl transition-all group-hover:opacity-40';
                document.querySelector('.profile-scanner').prepend(img);
            }
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
