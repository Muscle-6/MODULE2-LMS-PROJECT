<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module02 LMS - UPDATE PROFILE</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "secondary": "#c97cff",
                        "surface-container": "#161a21",
                        "surface-container-high": "#1c2028",
                        "on-surface": "#ecedf6",
                        "on-surface-variant": "#a9abb3",
                        "outline-variant": "#45484f",
                        "error": "#ff716c"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image: radial-gradient(circle at 50% 50%, rgba(153, 247, 255, 0.05) 0%, transparent 50%);
        }
        /* 커스텀 파일 인풋 스타일 */
        input[type="file"]::file-selector-button {
            background: rgba(153, 247, 255, 0.1);
            border: 1px solid rgba(153, 247, 255, 0.2);
            color: #99f7ff;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-right: 1rem;
            font-family: 'Space Grotesk';
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #99f7ff;
            color: #0b0e14;
        }
    </style>
</head>

<body class="min-h-screen">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl border-b border-white/5">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-bold tracking-tighter text-cyan-400 font-headline uppercase">Module02 LMS</span>
    </div>

    <div th:if="${loginMember != null}" class="flex items-center gap-4 text-sm">
        <div class="text-right hidden sm:block mr-2">
            <span class="text-xs font-label tracking-widest text-cyan-400" th:text="|${loginMember.name} 님|"></span>
            <span class="text-[10px] text-slate-500 font-label tracking-tight ml-1" th:text="|(${loginMember.role})|"></span>
        </div>
        <a th:href="@{/logout}" class="flex items-center gap-1 text-slate-400 hover:text-error transition-colors text-xs font-label uppercase tracking-widest">
            <span class="material-symbols-outlined text-sm">power_settings_new</span> 로그아웃
        </a>
    </div>
</header>

<aside class="fixed left-0 top-16 bottom-0 flex flex-col z-40 bg-slate-950/80 backdrop-blur-lg w-64 shadow-[4px_0_24px_rgba(0,0,0,0.5)] border-r border-white/5 transition-all duration-300">

    <div class="p-6 border-b border-white/5" th:if="${loginMember != null}">
        <div class="flex items-center gap-4 group">
            <div class="h-11 w-11 rounded-xl bg-cyan-400/10 flex items-center justify-center border border-cyan-400/20 shadow-[0_0_15px_rgba(153,247,255,0.1)] group-hover:border-cyan-400/40 transition-all">
                <span class="material-symbols-outlined text-cyan-400 text-2xl" style="font-variation-settings: 'FILL' 1;">military_tech</span>
            </div>
            <div class="flex flex-col">
                <p class="text-xs font-headline font-black text-cyan-400 tracking-tight leading-none mb-1 uppercase" th:text="${loginMember.name}">OPERATIVE</p>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <p class="text-[10px] font-label text-slate-500 font-bold tracking-tighter uppercase" th:text="|RANK: ${loginMember.role}|">RANK</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="flex-1 py-6 space-y-1">
        <div class="px-6 mb-4">
            <span class="text-[9px] font-label font-black text-slate-600 uppercase tracking-[0.3em]">Main Protocol</span>
        </div>

        <a th:href="@{/}" data-menu="continent"
           class="menu-item flex items-center gap-4 py-3.5 px-6 transition-all duration-200 group text-slate-500 hover:bg-white/5 hover:text-slate-300">
            <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">public</span>
            <span class="text-sm font-label font-bold tracking-wide">대륙 탐색</span>
        </a>

        <a th:href="@{/student}" data-menu="student"
           class="menu-item flex items-center gap-4 py-3.5 px-6 transition-all duration-200 group text-slate-500 hover:bg-white/5 hover:text-slate-300">
            <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">rocket_launch</span>
            <span class="text-sm font-label font-bold tracking-wide">학생 홈</span>
        </a>
    </nav>

    <div class="p-6 mt-auto">
        <div class="relative group cursor-help">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>

            <div class="relative w-full bg-slate-900/50 border border-white/10 p-4 rounded-xl">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[9px] font-label font-black text-slate-500 uppercase tracking-widest">Network Status</span>
                    <span class="flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                </div>

                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary text-sm animate-pulse">radar</span>
                    <div class="flex-1">
                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-primary w-[85%] shadow-[0_0_8px_#99f7ff]"></div>
                        </div>
                    </div>
                </div>
                <p class="mt-2 text-[9px] font-label text-primary/60 text-center uppercase tracking-[0.2em]">System Online</p>
            </div>
        </div>
    </div>
</aside>

<main class="ml-64 pt-24 px-10 pb-16 flex justify-center">
    <div class="w-full max-w-4xl">

        <div class="mb-10">
            <h1 class="text-4xl font-headline font-bold text-on-surface tracking-tight mb-2 uppercase">Sync Profile</h1>
            <p class="text-on-surface-variant font-body text-sm">요원 데이터를 최신 상태로 동기화하십시오. 일부 필드는 사령부 지침에 따라 수정이 제한됩니다.</p>
        </div>

        <form th:action="@{/student/profile/edit}" method="post" enctype="multipart/form-data"
              class="bg-surface-container/60 backdrop-blur-xl p-10 rounded-2xl border border-outline-variant/10 shadow-2xl space-y-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">

                <div class="relative group">
                    <label class="text-[10px] font-label text-slate-500 uppercase tracking-widest block mb-2">Identification ID (Locked)</label>
                    <div class="relative">
                        <input type="text" th:value="${user.loginId}" disabled
                               class="w-full bg-black/40 border border-white/5 rounded-lg px-4 py-3 text-sm text-slate-600 font-headline cursor-not-allowed"/>
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-sm text-slate-700">lock</span>
                    </div>
                </div>

                <div class="relative group">
                    <label class="text-[10px] font-label text-cyan-400 uppercase tracking-widest block mb-2">Display Name</label>
                    <input type="text" name="name" th:value="${user.name}"
                           class="w-full bg-slate-900/50 border border-outline-variant/30 rounded-lg px-4 py-3 text-sm text-on-surface font-headline focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-700"
                           placeholder="Enter your name"/>
                </div>

                <div class="relative group">
                    <label class="text-[10px] font-label text-cyan-400 uppercase tracking-widest block mb-2">Communication Link (Email)</label>
                    <input type="text" name="email" th:value="${user.email}"
                           class="w-full bg-slate-900/50 border border-outline-variant/30 rounded-lg px-4 py-3 text-sm text-on-surface font-headline focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all"/>
                </div>

                <div class="relative group">
                    <label class="text-[10px] font-label text-cyan-400 uppercase tracking-widest block mb-2">Signal Frequency (Phone)</label>
                    <input type="text" name="phone" th:value="${user.phone}"
                           class="w-full bg-slate-900/50 border border-outline-variant/30 rounded-lg px-4 py-3 text-sm text-on-surface font-headline focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all"/>
                </div>

                <div class="md:col-span-2 relative group">
                    <label class="text-[10px] font-label text-cyan-400 uppercase tracking-widest block mb-2">Operative Biography</label>
                    <textarea name="introduction" rows="5"
                              class="w-full bg-slate-900/50 border border-outline-variant/30 rounded-lg px-4 py-4 text-sm text-on-surface-variant font-body focus:border-primary/50 focus:ring-1 focus:ring-primary/20 outline-none transition-all resize-none"
                              th:text="${user.introduction}" placeholder="자기소개를 입력하십시오..."></textarea>
                </div>

                <div class="md:col-span-2 relative group">
                    <label class="text-[10px] font-label text-secondary uppercase tracking-widest block mb-2">Visual ID Identification (Image)</label>
                    <div class="bg-black/30 border border-dashed border-outline-variant/40 rounded-xl p-6 transition-all hover:border-secondary/40">
                        <input type="file" name="profileImageFile"
                               class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-secondary/10 file:text-secondary hover:file:bg-secondary/20 cursor-pointer"/>
                        <p class="mt-2 text-[10px] text-slate-600 font-label uppercase tracking-tight italic">Recommended: Square format (PNG, JPG)</p>
                    </div>
                </div>

            </div>

            <div class="flex justify-end gap-4 pt-6 border-t border-white/5">
                <a th:href="@{/student/profile}"
                   class="px-8 py-3 rounded-lg text-xs font-label font-bold tracking-widest text-slate-500 hover:text-on-surface hover:bg-white/5 transition-all uppercase">
                    Abort
                </a>

                <button type="submit"
                        class="px-10 py-3 bg-primary text-slate-950 font-headline text-sm font-black rounded-lg hover:bg-white hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(153,247,255,0.3)] uppercase tracking-tighter flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">save</span> Commit Changes
                    </a>
            </div>

        </form>
    </div>
</main>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const path = window.location.pathname;
        const activeClass = "text-cyan-400 bg-cyan-400/10 border-r-4 border-cyan-400";
        const inactiveClass = "text-slate-500 hover:bg-white/5 hover:text-slate-300";

        const continentMenu = document.querySelector('[data-menu="continent"]');
        const studentMenu = document.querySelector('[data-menu="student"]');

        // 모든 메뉴 초기화
        document.querySelectorAll('.menu-item').forEach(el => {
            el.className = el.className.replace(activeClass, "").trim() + " " + inactiveClass;
        });

        // 경로에 따라 불 켜기
        if (path.startsWith('/student')) {
            studentMenu.className = studentMenu.className.replace(inactiveClass, "").trim() + " " + activeClass;
        } else {
            // 루트(/), /continents, /posts 등은 모두 대륙 탐색 활성화
            continentMenu.className = continentMenu.className.replace(inactiveClass, "").trim() + " " + activeClass;
        }
    });
</script>
</body>
</html>
