<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TRANSMISSION DETAIL | MODULE02 LMS</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            margin: 0;
            padding: 40px;
            background-image: radial-gradient(circle at 50% 50%, rgba(153,247,255,0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .detail-card {
            background: rgba(22,26,33,0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
        }

        .detail-card:hover {
            border-color: rgba(153,247,255,0.3);
            box-shadow: 0 0 30px rgba(153,247,255,0.08);
        }

        .card-header {
            padding: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-family: 'Space Grotesk';
            font-size: 26px;
            color: #e5e7eb;
            margin: 10px 0;
        }

        .meta-info {
            display: flex;
            gap: 20px;
            color: #6b7280;
            font-size: 12px;
            margin-top: 10px;
        }

        .meta-item b {
            color: #d1d5db;
        }

        .status-badge {
            font-family: 'Space Grotesk';
            font-size: 11px;
        }

        .status-waiting  { color: #fbbf24; }
        .status-complete { color: #4ade80; }

        .card-body {
            padding: 40px 30px;
            line-height: 1.8;
            color: #d1d5db;
            white-space: pre-wrap;
        }

        .answer-box {
            margin: 0 30px 30px 30px;
            padding: 24px;
            background: rgba(0,0,0,.3);
            border-radius: 10px;
            border: 1px solid rgba(153,247,255,0.1);
        }

        .answer-title {
            color: #99f7ff;
            font-family: 'Space Grotesk';
            font-size: 13px;
            margin-bottom: 12px;
        }

        .answer-date {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .btn {
            font-family: 'Space Grotesk';
            padding: 8px 18px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #9ca3af;
            transition: .2s;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            color: #99f7ff;
            border-color: #99f7ff;
        }

        .btn-edit {
            border-color: rgba(153,247,255,0.3);
            color: #99f7ff;
        }

        .btn-delete {
            border-color: rgba(239,68,68,.4);
            color: #f87171;
        }

        .btn-delete:hover {
            background: rgba(239,68,68,.1);
        }

        .card-footer {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pending-box {
            margin: 0 30px 30px 30px;
            padding: 20px;
            text-align: center;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #6b7280;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="detail-card">

        <!-- HEADER -->
        <div class="card-header">
            <div>
                <span th:if="${qna.isAnswered}" class="status-badge status-complete">RESOLVED</span>
                <span th:unless="${qna.isAnswered}" class="status-badge status-waiting">PENDING</span>
            </div>

            <h1 th:text="${qna.qnaTitle}">제목</h1>

            <div class="meta-info">
                <div class="meta-item">작성자: <b th:text="${qna.authorName}"></b></div>
                <div class="meta-item">작성일: <b th:text="${qna.createdAt}"></b></div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="card-body" th:text="${qna.qnaContent}"></div>

        <!-- ANSWER -->
        <div th:if="${qna.isAnswered}" class="answer-box">
            <div class="answer-title">[답변]</div>
            <div class="answer-date"
                 th:text="${#temporals.format(qna.answeredAt, 'yyyy.MM.dd HH:mm')}"></div>
            <div th:text="${qna.answerContent}" style="white-space: pre-wrap;"></div>
        </div>

        <div th:unless="${qna.isAnswered}" class="pending-box">
            답변 대기 중입니다.
        </div>

        <!-- FOOTER -->
        <div class="card-footer">

            <a th:href="@{/student/course/{id}/qna(id=${courseId})}" class="btn">
                ← 목록
            </a>

            <div th:if="${qna.memberId == currentMemberId}">
                <a th:href="@{/student/course/{cId}/qna/{qId}/edit(cId=${courseId}, qId=${qna.qnaId})}"
                   class="btn btn-edit">수정</a>

                <form th:action="@{/student/course/{cId}/qna/{qId}/delete(cId=${courseId}, qId=${qna.qnaId})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-delete">삭제</button>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
