<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>TRANSMISSION DETAIL | ILLUMINATI LMS</title>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 상세 카드 섹션 */
        .detail-card {
            background-color: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            padding: 30px;
            border-bottom: 1px solid #334155;
            background: linear-gradient(to right, #1e293b, #273549);
        }

        .status-area { margin-bottom: 12px; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-waiting  { background-color: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        .status-complete { background-color: #065f46; color: #34d399; border: 1px solid #10b981; }

        h1 { margin: 10px 0; font-size: 1.8rem; color: #f8fafc; }

        .meta-info {
            display: flex;
            gap: 20px;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        .meta-item b { color: #cbd5e1; }

        /* 본문 내용 */
        .card-body {
            padding: 40px 30px;
            line-height: 1.8;
            color: #cbd5e1;
            min-height: 200px;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }

        /* 하단 액션 버튼 */
        .card-footer {
            padding: 20px 30px;
            background-color: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-back { color: #94a3b8; }
        .btn-back:hover { color: #f8fafc; }

        .btn-edit { background-color: #3b82f6; color: white; margin-right: 10px; }
        .btn-edit:hover { background-color: #2563eb; }

        .btn-delete { background-color: #ef4444; color: white; }
        .btn-delete:hover { background-color: #dc2626; }

        /* 답변 구역 (나중에 구현하실 때 참고!) */
        .answer-section {
            margin-top: 30px;
            padding: 25px;
            background-color: #0f172a;
            border-left: 4px solid #10b981;
            border-radius: 4px;
        }
        .answer-header { font-weight: bold; color: #10b981; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="detail-card">
        <div class="card-header">
            <div class="status-area">
                <span th:if="${qna.isAnswered}"  class="status-badge status-complete">RESOLVED</span>
                <span th:unless="${qna.isAnswered}" class="status-badge status-waiting">PENDING</span>
            </div>
            <h1 th:text="${qna.qnaTitle}">통신 타이틀</h1>
            <div class="meta-info">
                <div class="meta-item">AGENT: <b th:text="${qna.authorName}">요원명</b></div>
                <div class="meta-item">TIMESTAMP: <b th:text="${qna.createdAt}">2026-04-19</b></div>
            </div>
        </div>

        <div class="card-body" th:text="${qna.qnaContent}">
            전송된 기밀 데이터 내용이 여기에 표시됩니다.
        </div>

        <div th:if="${qna.isAnswered}" class="answer-section">
            <div class="answer-header">
                <span>[▲] INSTRUCTOR RESPONSE</span>
            </div>
            <div style="color: #e2e8f0;" th:text="${qna.answerContent}">
                여기는 강사님의 답변 내용이 들어갈 자리입니다 오호이야~!
            </div>
        </div>

        <div class="card-footer">
            <a th:href="@{/student/course/{id}/qna(id=${courseId})}" class="btn btn-back">
                ← BACK TO LIST
            </a>

            <div th:if="${qna.memberId == currentMemberId}">
                <a th:href="@{/student/course/{cId}/qna/{qId}/edit(cId=${courseId}, qId=${qna.qnaId})}" class="btn btn-edit">
                    MODIFY
                </a>
                <form th:action="@{/student/course/{cId}/qna/{qId}/delete(cId=${courseId}, qId=${qna.qnaId})}"
                      method="post" style="display: inline;">
                    <button type="submit" class="btn btn-delete">PURGE</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
