<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title th:text="${continent.continentName} + ' 상세'">대륙 상세</title>
    <style>
        /* 선배님이 주신 스타일 시트는 그대로 유지합니다 오호이야~! */
        body { margin: 0; font-family: Arial, sans-serif; background: #0b1020; color: #f5f7ff; }
        .container { width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .top-bar a { color: #fff; text-decoration: none; padding: 10px 16px; border: 1px solid #5f7cff; border-radius: 8px; }
        .hero { background: linear-gradient(135deg, #111933, #1d295f); border-radius: 18px; padding: 32px; margin-bottom: 32px; }
        .hero h1 { margin-top: 0; margin-bottom: 12px; }
        .hero p { margin: 0; line-height: 1.6; color: #d9dff8; }
        .section { margin-bottom: 36px; background: #121a35; border-radius: 18px; padding: 28px; }
        .btn { display: inline-block; padding: 10px 14px; border-radius: 8px; background: #5f7cff; color: white; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <a th:href="@{/student/continents}">← 목록으로</a>

        <a sec:authorize="isAnonymous()" th:href="@{/login}">로그인</a>

        <a sec:authorize="isAuthenticated()" th:href="@{/logout}">로그아웃</a>
    </div>

    <section class="hero">
        <h1 th:text="${continent.continentName}">대륙명</h1>
        <p th:text="${continent.continentDescription}">대륙 설명</p>
    </section>

    <section class="section">
        <h2>강좌 목록</h2>
        <p class="empty">현재 공개된 강좌 정보는 준비 중입니다.</p>

        <p class="login-guide" sec:authorize="isAnonymous()">
            강좌 상세 및 수강 기능은 로그인 후 이용할 수 있습니다.
        </p>

        <a class="btn" href="javascript:alert('현재 강좌 상세 조회 기능을 침공 준비 중입니다! 오호이야~!');">
            강좌 세부
        </a>

    </section>

    <section class="section">
        <h2>대륙 게시판</h2>
        <p class="empty">아직 게시글이 없습니다.</p>
        <a class="btn" th:href="@{/student/continents}">목록으로 돌아가기</a>
    </section>

</div>
</body>
</html>
