<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module02 LMS - 우주 탐색 프로토콜</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#10131a",
                        "surface-tint": "#99f7ff",
                        "primary": "#99f7ff",
                        "primary-dim": "#00e2ee",
                        "on-primary": "#005f64",
                        "on-secondary": "#350056",
                        "on-secondary-container": "#fff5ff",
                        "surface-container-lowest": "#000000",
                        "error-container": "#9f0519",
                        "secondary": "#c97cff",
                        "on-error-container": "#ffa8a3",
                        "on-surface": "#ecedf6",
                        "background": "#0b0e14",
                        "on-error": "#490006",
                        "surface": "#0b0e14",
                        "on-tertiary": "#006164",
                        "on-primary-fixed": "#004145",
                        "tertiary-container": "#72eff5",
                        "on-primary-container": "#00555a",
                        "surface-container-high": "#1c2028",
                        "error-dim": "#d7383b",
                        "surface-variant": "#22262f",
                        "on-background": "#ecedf6",
                        "surface-container": "#161a21",
                        "inverse-primary": "#006a70",
                        "on-tertiary-container": "#00585b",
                        "secondary-container": "#9000de",
                        "primary-container": "#00f1fe",
                        "surface-container-highest": "#22262f",
                        "error": "#ff716c",
                        "surface-dim": "#0b0e14",
                        "outline-variant": "#45484f",
                        "tertiary": "#9dfaff",
                        "surface-bright": "#282c36",
                        "inverse-surface": "#f9f9ff",
                        "inverse-on-surface": "#52555c",
                        "on-surface-variant": "#a9abb3",
                        "outline": "#73757d"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #ecedf6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .planet-glow:hover { box-shadow: 0 0 40px rgba(153, 247, 255, 0.2); }
    </style>
</head>

<body class="min-h-screen">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl shadow-[0_0_20px_rgba(153,247,255,0.1)]">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-bold tracking-tighter text-cyan-400 font-headline">MODULE02 LMS</span>
    </div>
</header>

<aside class="fixed left-0 top-16 bottom-0 flex flex-col z-40 bg-slate-950/80 backdrop-blur-lg w-64 shadow-[4px_0_24px_rgba(0,0,0,0.5)]">
    <nav class="flex-1 py-4">
        <a href="/" class="flex items-center gap-4 text-cyan-400 bg-cyan-400/10 border-r-4 border-cyan-400 py-3 px-6 font-label">
            <span class="material-symbols-outlined">public</span>
            <span class="text-sm tracking-wide">대륙 탐색</span>
        </a>

        <th:block th:if="${loginMember != null}">
            <a th:if="${loginMember.role.name() == 'STUDENT'}" th:href="@{/student}" class="flex items-center gap-4 text-slate-500 py-3 px-6 hover:bg-slate-800/40 hover:text-cyan-300 transition-all font-label">
                <span class="material-symbols-outlined">rocket_launch</span>
                <span class="text-sm tracking-wide">학생 홈</span>
            </a>

            <a th:if="${loginMember.role.name() == 'INSTRUCTOR'}" th:href="@{/instructor}" class="flex items-center gap-4 text-slate-500 py-3 px-6 hover:bg-slate-800/40 hover:text-cyan-300 transition-all font-label">
                <span class="material-symbols-outlined">satellite_alt</span>
                <span class="text-sm tracking-wide">강사 사령부</span>
            </a>

            <a th:if="${loginMember.role.name() == 'ADMIN'}" th:href="@{/admin}" class="flex items-center gap-4 text-slate-500 py-3 px-6 hover:bg-slate-800/40 hover:text-cyan-300 transition-all font-label">
                <span class="material-symbols-outlined">admin_panel_settings</span>
                <span class="text-sm tracking-wide">관리 시스템</span>
            </a>
        </th:block>

    </nav>
</aside>

<main class="ml-64 pt-24 px-8 pb-12">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
        <div>
            <h1 class="text-4xl font-headline font-bold text-on-surface tracking-tight mb-2">TARGET DESTINATIONS</h1>
            <p class="text-on-surface-variant max-w-xl font-body">탐색할 수 있는 대륙(행성)들을 확인하고 입장을 준비하십시오.</p>
        </div>
        <form th:action="@{/}" method="get" class="w-full md:w-auto flex gap-3">
            <input type="text" name="query" th:value="${query}" placeholder="대륙명 검색" class="w-full md:w-80 px-4 py-3 rounded-lg bg-surface-container border border-outline-variant/20 text-on-surface"/>
            <button type="submit" class="px-5 py-3 rounded-lg bg-primary text-on-primary-container font-bold">SEARCH</button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(continents)}" class="text-center p-20 border-2 border-dashed border-outline-variant/20 rounded-2xl">
        <h3 class="text-xl font-headline text-on-surface-variant">UNKNOWN SECTOR</h3>
        <p class="text-xs text-slate-500 mt-2">현재 발견된 대륙이 존재하지 않습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(continents)}" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
        <div class="group relative flex flex-col items-center h-full" th:each="continent : ${continents}">
            <div class="relative w-64 h-64 mb-8">
                <div class="absolute inset-0 rounded-full overflow-hidden planet-glow border-2 border-primary/20">
                    <img th:if="${continent.thumbnailUrl != null}" th:src="${continent.thumbnailUrl}" class="w-full h-full object-cover"/>
                    <div th:if="${continent.thumbnailUrl == null}" class="w-full h-full bg-slate-900 flex items-center justify-center">
                        <span class="material-symbols-outlined text-5xl opacity-50">satellite_alt</span>
                    </div>
                </div>
            </div>

            <div class="w-full bg-surface-container/60 backdrop-blur-xl p-6 rounded-xl border border-outline-variant/10 flex flex-col flex-1">
                <h3 class="text-2xl font-headline font-bold mb-2 text-primary" th:text="${continent.continentName}"></h3>
                <p class="text-on-surface-variant text-sm mb-6 font-body flex-grow" th:text="${continent.continentDescription}"></p>
                <a th:href="@{/continents/{id}(id=${continent.continentId})}" class="block text-center w-full py-3 bg-primary text-on-primary-container font-bold rounded-lg hover:scale-105 transition-transform">
                    ENTER SECTOR
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
