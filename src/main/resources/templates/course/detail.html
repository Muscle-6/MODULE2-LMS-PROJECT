<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${course.courseTitle} + ' - 상세 조회'">강좌 상세</title>
  <style>
    body { background: #0b1020; color: #f5f7ff; font-family: Arial, sans-serif; margin: 0; }
    .container { width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .course-header { background: linear-gradient(135deg, #1a2447, #25336b); padding: 40px; border-radius: 18px; margin-bottom: 30px; border: 1px solid rgba(126, 224, 255, 0.2); }
    .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
    .section { background: #121a35; padding: 28px; border-radius: 18px; margin-bottom: 24px; }
    .curriculum-card { background: #1a2447; padding: 18px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; }
    .curriculum-card:hover { border-color: #5f7cff; }
    .sticky-side { position: sticky; top: 20px; }
    .price-tag { font-size: 28px; color: #7ee0ff; font-weight: bold; margin-bottom: 20px; }
    .btn-apply { display: block;                  /* 👈 인라인 요소를 블록으로 강제 전환 */
      width: 100%;                     /* 👈 부모 너비에 꽉 채우기 */
      box-sizing: border-box;          /* 👈 핵심! 패딩과 테두리를 너비에 포함시킴 */
      padding: 18px;
      background: #5f7cff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      line-height: 1; }
    .btn-watch { padding: 8px 16px; background: #5f7cff; color: white; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; }
    .btn-watch:hover { background: #4a63ff; transform: scale(1.05); }
    .instructor-badge { display: inline-block; padding: 4px 12px; background: rgba(126, 224, 255, 0.1); color: #7ee0ff; border-radius: 999px; font-size: 14px; margin-top: 10px; }
    .rounded-back-btn { display: inline-block; padding: 12px 24px; background: rgba(95, 124, 255, 0.1); color: #7ee0ff; text-decoration: none; border-radius: 999px; font-size: 14px; font-weight: 500; border: 1px solid rgba(126, 224, 255, 0.2); transition: 0.3s; }
    .rounded-back-btn:hover { background: rgba(95, 124, 255, 0.2); border-color: #5f7cff; transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="container">
  <div style="margin-bottom: 25px;">
    <a href="javascript:history.back();" class="rounded-back-btn">← 목록으로 돌아가기</a>
  </div>

  <section class="course-header">
    <h1 th:text="${course.courseTitle}">강좌 제목</h1>
    <p th:text="${course.courseDescription}">강좌 상세 설명</p>
    <div class="instructor-badge">
      강사 : <span th:text="${course.instructorName}">강사명</span>
    </div>
  </section>

  <div class="grid-container">
    <div class="main-content">
      <section class="section">
        <h2>강의 커리큘럼</h2>
        <div class="curriculum-list" th:if="${!#lists.isEmpty(lectures)}">
          <div class="curriculum-card" th:each="lecture : ${lectures}">
            <div>
              <span style="color: #7ee0ff; margin-right: 10px;" th:text="${lecture.lectureOrderIndex} + '.'">1.</span>
              <span th:text="${lecture.lectureTitle}">강의 제목</span>
            </div>

            <div th:if="${isEnrolled}">
              <a th:href="@{/lectures/{id}(id=${lecture.lectureId})}" class="btn-watch">강의 시청 →</a>
            </div>
            <span th:unless="${isEnrolled}" style="font-size: 12px; color: #a9b6ec;">침공 시 공개</span>
          </div>
        </div>
        <p class="empty" th:if="${#lists.isEmpty(lectures)}">등록된 강의가 없습니다.</p>
      </section>
    </div>

    <div class="sticky-side">
      <div class="section">
        <h3 style="margin-top: 0;">프로토콜 상태</h3>

        <div th:if="${isEnrolled}">
          <div class="price-tag" style="font-size: 24px;">침공 진행 중 🛸</div>
          <p style="color: #a9b6ec; font-size: 14px; line-height: 1.6; margin-bottom: 20px;">
            이미 승인된 프로토콜입니다.<br>커리큘럼을 통해 학습을 이어가세요.
          </p>
          <div class="btn-apply" style="background: #25336b; color: #7ee0ff; cursor: default;">승인 완료</div>
        </div>

        <div th:unless="${isEnrolled}">
          <div class="price-tag" th:text="${#numbers.formatInteger(course.coursePrice, 1, 'COMMA')} + '원'">가격</div>
          <button class="btn-apply">지금 바로 침공하기</button>
        </div>

        <div style="margin-top: 20px; font-size: 13px; color: #b8c1e7; line-height: 1.6;">
          <p>✔ 수강 기간: 무제한</p>
          <p>✔ 상태:
            <span th:text="${course.courseStatus == 'PUBLISHED' ? '침공 가능' : '대기 중'}" style="color: #5f7cff; font-weight: bold;">상태</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
