<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lecture.lectureTitle} + ' - 강의 시청'">강의 시청</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b1020;
            color: #f5f7ff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* ===== 헤더 ===== */
        .header {
            display: flex;
            align-items: center;
            padding: 16px 32px;
            background: #0d1117;
            border-bottom: 1px solid rgba(95, 124, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
        }

        .lecture-title-header {
            font-size: 1rem;
            font-weight: 600;
            color: #f5f7ff;
            max-width: 600px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== 메인 레이아웃 ===== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ===== 영상 플레이어 ===== */
        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(95, 124, 255, 0.15);
            margin-bottom: 24px;
            position: relative;
        }

        .video-container video {
            width: 100%;
            display: block;
            max-height: 600px;
        }

        .no-video {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            background: #121a35;
            color: #626e9f;
            gap: 12px;
        }

        /* ===== 강의 정보 카드 ===== */
        .info-card {
            background: #121a35;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(95, 124, 255, 0.1);
            margin-bottom: 24px;
        }

        .info-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f5f7ff;
            margin-bottom: 20px;
        }

        /* ===== 버튼 영역 ===== */
        .action-area {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-complete {
            background: linear-gradient(135deg, #5f7cff, #7ee0ff);
            color: #0b1020;
        }

        .btn-complete:hover { opacity: 0.85; transform: translateY(-1px); }

        .btn-complete:disabled {
            background: #2a3a5c;
            color: #626e9f;
            cursor: not-allowed;
            transform: none;
            opacity: 1;
        }

        .btn-exit {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-exit:hover { background: rgba(239, 68, 68, 0.2); }

        /* ===== 완료 상태 배지 ===== */
        .badge-completed {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: 10px;
            color: #34d399;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* ===== 건너뛰기 경고 ===== */
        .skip-warning {
            display: none;
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 10;
            white-space: nowrap;
        }

        /* ===== 종료 확인 모달 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal-card {
            background: #121a35;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-icon { font-size: 2.5rem; margin-bottom: 16px; }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f5f7ff;
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 0.9rem;
            color: #a9b6ec;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
    </style>
</head>

<body>

<!-- ===== 헤더 ===== -->
<header class="header">
    <span class="lecture-title-header" th:text="${lecture.lectureTitle}">강의 제목</span>
</header>

<!-- ===== MAIN ===== -->
<div class="main-container">

    <!-- 영상 플레이어 -->
    <div class="video-container">
        <div class="skip-warning" id="skipWarning">⚠ 건너뛰기는 허용되지 않습니다</div>

        <video th:if="${lecture.videoStatus.name() == 'READY'}"
               id="lectureVideo"
               controls
               controlsList="nodownload"
               oncontextmenu="return false;">
            <source th:src="${lecture.videoUrl}" type="video/mp4"/>
            브라우저가 video 태그를 지원하지 않습니다.
        </video>

        <div th:if="${lecture.videoStatus.name() == 'UPLOADING'}" class="no-video">
            <p style="color: #f5c542;">⏳ 영상을 업로드하는 중입니다. 잠시 후 다시 확인해주세요.</p>
        </div>

        <div th:if="${lecture.videoStatus.name() == 'NONE'}" class="no-video">
            <p>등록된 영상이 없습니다.</p>
        </div>
    </div>

    <!-- 강의 정보 + 버튼 -->
    <div class="info-card">
        <h1 th:text="${lecture.lectureTitle}">강의 제목</h1>
        <div class="action-area">

            <!-- 이미 완료된 경우 -->
            <span th:if="${isCompleted}" class="badge-completed">✔ 수강 완료</span>

            <!-- 수강 완료 버튼 — form POST 방식 (진척도 기능 연결 예정) -->
            <form th:unless="${isCompleted}"
                  th:action="@{/student/lectures/{lectureId}/complete(lectureId=${lecture.lectureId})}"
                  method="post"
                  id="completeForm">
                <button type="submit"
                        id="completeBtn"
                        class="btn btn-complete"
                        disabled>
                    수강 완료
                </button>
            </form>

            <!-- 종료 버튼 -->
            <button type="button"
                    class="btn btn-exit"
                    onclick="openExitModal()">
                종료
            </button>
        </div>
    </div>

</div>

<!-- ===== 종료 확인 모달 ===== -->
<div class="modal-overlay" id="exitModal">
    <div class="modal-card">
        <div class="modal-icon">🚀</div>
        <p class="modal-title">강의를 종료하시겠습니까?</p>
        <p class="modal-desc">
            현재까지의 시청 위치가 저장됩니다.<br>
            다음에 이어서 시청할 수 있습니다.
        </p>
        <div class="modal-actions">
            <button type="button"
                    class="btn btn-exit"
                    onclick="confirmExit()">
                예, 종료합니다
            </button>
            <button type="button"
                    class="btn"
                    style="background: rgba(95,124,255,0.1); color: #a9b6ec; border: 1px solid rgba(95,124,255,0.2);"
                    onclick="closeExitModal()">
                계속 시청
            </button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const lectureId = /*[[${lecture.lectureId}]]*/ 0;

    const video = document.getElementById('lectureVideo');
    const completeBtn = document.getElementById('completeBtn');
    const skipWarning = document.getElementById('skipWarning');

    if (video) {
        let maxWatchedTime = 0;

        // 이어보기 — 페이지 로드 시 저장된 위치로 이동
        const savedPosition = localStorage.getItem('lecture_pos_' + lectureId);
        if (savedPosition) {
            video.currentTime = parseInt(savedPosition);
            maxWatchedTime = parseInt(savedPosition);
        }

        // 건너뛰기 방지
        video.addEventListener('timeupdate', function () {
            if (video.currentTime > maxWatchedTime + 3) {
                video.currentTime = maxWatchedTime;
                skipWarning.style.display = 'block';
                setTimeout(() => { skipWarning.style.display = 'none'; }, 2000);
            } else {
                maxWatchedTime = Math.max(maxWatchedTime, video.currentTime);
            }
        });

        // 30초마다 현재 위치 저장
        setInterval(() => {
            localStorage.setItem('lecture_pos_' + lectureId, Math.floor(video.currentTime));
        }, 30000);

        // 영상 끝까지 재생 완료 시 수강 완료 버튼 활성화
        video.addEventListener('ended', function () {
            if (completeBtn) {
                completeBtn.disabled = false;
                localStorage.removeItem('lecture_pos_' + lectureId);
            }
        });
    }

    // ===== 종료 모달 =====
    function openExitModal() {
        // 모달 열기 전 현재 위치 저장
        if (video) {
            localStorage.setItem('lecture_pos_' + lectureId, Math.floor(video.currentTime));
        }
        document.getElementById('exitModal').classList.add('active');
    }

    function closeExitModal() {
        document.getElementById('exitModal').classList.remove('active');
    }

    function confirmExit() {
        history.back();
    }

    // 모달 바깥 클릭 시 닫기
    document.getElementById('exitModal').addEventListener('click', function (e) {
        if (e.target === this) closeExitModal();
    });
</script>

</body>
</html>
