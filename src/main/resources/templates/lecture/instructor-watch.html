<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lecture.lectureTitle} + ' - 강의 미리보기'">강의 미리보기</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b1020;
            color: #f5f7ff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #0d1117;
            border-bottom: 1px solid rgba(95, 124, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #626e9f;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-btn:hover { color: #a9b6ec; }

        .lecture-title-header {
            font-size: 1rem;
            font-weight: 600;
            color: #f5f7ff;
            max-width: 600px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 강사 배지 */
        .instructor-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(153, 247, 255, 0.1);
            border: 1px solid rgba(153, 247, 255, 0.3);
            border-radius: 20px;
            color: #99f7ff;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .video-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(95, 124, 255, 0.15);
            margin-bottom: 24px;
        }

        .video-container video {
            width: 100%;
            display: block;
            max-height: 600px;
        }

        /* 업로드 중 상태 */
        .uploading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            background: #121a35;
            gap: 16px;
        }

        .uploading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(153, 247, 255, 0.1);
            border-top-color: #99f7ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .uploading-text {
            color: #99f7ff;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .uploading-sub {
            color: #626e9f;
            font-size: 0.8rem;
        }

        /* 영상 없음 상태 */
        .no-video {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            background: #121a35;
            color: #626e9f;
            gap: 12px;
        }

        .info-card {
            background: #121a35;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(95, 124, 255, 0.1);
            margin-bottom: 24px;
        }

        .info-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f5f7ff;
            margin-bottom: 20px;
        }

        .action-area {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(153, 247, 255, 0.1);
            color: #99f7ff;
            border: 1px solid rgba(153, 247, 255, 0.3);
        }

        .btn-edit:hover { background: rgba(153, 247, 255, 0.2); }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: #a9b6ec;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-back:hover { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>

<body>

<!-- ===== 헤더 ===== -->
<header class="header">
    <div class="header-left">
        <a th:href="@{/instructor/courses/{courseId}/lectures(courseId=${courseId})}"
           class="back-btn">
            ← 강의 목록
        </a>
        <span class="lecture-title-header" th:text="${lecture.lectureTitle}">강의 제목</span>
    </div>
    <span class="instructor-badge">👨‍🏫 강사 미리보기</span>
</header>

<!-- ===== MAIN ===== -->
<div class="main-container">

    <!-- 영상 플레이어 -->
    <div class="video-container">

        <!-- 정상 재생 가능 -->
        <video th:if="${lecture.videoStatus.name() == 'READY'}"
               controls
               controlsList="nodownload"
               oncontextmenu="return false;">
            <source th:src="${lecture.videoUrl}" type="video/mp4"/>
            브라우저가 video 태그를 지원하지 않습니다.
        </video>

        <!-- 업로드 중 -->
        <div th:if="${lecture.videoStatus.name() == 'UPLOADING'}" class="uploading-state">
            <div class="uploading-spinner"></div>
            <p class="uploading-text">영상 업로드 중입니다...</p>
            <p class="uploading-sub">잠시 후 페이지를 새로고침 해주세요</p>
        </div>

        <!-- 영상 없음 -->
        <div th:if="${lecture.videoStatus.name() == 'NONE'}" class="no-video">
            <p>등록된 영상이 없습니다.</p>
        </div>

    </div>

    <!-- 강의 정보 + 버튼 -->
    <div class="info-card">
        <h1 th:text="${lecture.lectureTitle}">강의 제목</h1>
        <p th:if="${lecture.lectureDescription != null}"
           style="color: #a9b6ec; font-size: 0.95rem; line-height: 1.7; margin-bottom: 24px;"
           th:text="${lecture.lectureDescription}">강의 설명</p>
        <div class="action-area">
            <a th:href="@{/instructor/courses/{courseId}/lectures/{lectureId}/edit(courseId=${courseId}, lectureId=${lecture.lectureId})}"
               class="btn btn-edit">
                ✏ 강의 수정
            </a>
            <a th:href="@{/instructor/courses/{courseId}/lectures(courseId=${courseId})}"
               class="btn btn-back">
                목록으로
            </a>
        </div>
    </div>

</div>

</body>
</html>
