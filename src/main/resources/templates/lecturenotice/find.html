<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module02 LMS - 공지사항</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "on-primary-container": "#00555a",
                        "secondary": "#c97cff",
                        "on-secondary-container": "#fff5ff",
                        "error": "#ff716c",
                        "on-surface": "#ecedf6",
                        "surface-container": "#161a21",
                        "surface-container-highest": "#22262f",
                        "outline-variant": "#45484f",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(153, 247, 255, 0.05) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10L50 50M350 350L390 390' stroke='rgba(153, 247, 255, 0.1)' stroke-width='0.5'/%3E%3Ccircle cx='100' cy='100' r='1' fill='rgba(255,255,255,0.2)'/%3E%3Ccircle cx='300' cy='200' r='1' fill='rgba(255,255,255,0.3)'/%3E%3C/svg%3E");
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>

<body class="min-h-screen">

<!-- ===== HEADER ===== -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl shadow-[0_0_20px_rgba(153,247,255,0.1)] border-b border-cyan-400/10">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-bold tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(153,247,255,0.6)] font-headline">
            MODULE02 LMS
        </span>
    </div>
    <div class="flex items-center gap-4" th:if="${loginMember != null}">
        <span class="text-xs font-label tracking-widest text-cyan-400"
              th:text="|${loginMember.name} 님|"></span>
        <a th:href="@{/logout}"
           class="flex items-center gap-1 text-slate-400 hover:text-error transition-colors text-xs font-label">
            <span class="material-symbols-outlined text-sm">power_settings_new</span>
            로그아웃
        </a>
    </div>
</header>

<!-- ===== MAIN ===== -->
<main class="pt-24 px-6 md:px-12 pb-12">
    <section class="max-w-4xl mx-auto">

        <!-- 뒤로가기 + 타이틀 -->
        <div class="mb-8">
            <div class="flex items-center gap-3 mb-3">
                <a th:href="@{/instructor/courses/{courseId}/lectures(courseId=${courseId})}"
                   class="flex items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors text-xs font-label">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    강의 목록으로
                </a>
            </div>
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl md:text-4xl font-headline font-bold text-on-surface tracking-tight mb-2">
                        NOTICE
                    </h1>
                    <p class="text-slate-400 text-sm font-body">강좌 공지사항</p>
                </div>
                <!-- 강사만 공지사항 등록 버튼 표시 -->
                <a sec:authorize="hasRole('INSTRUCTOR')"
                   th:href="@{/instructor/courses/{courseId}/notices/add(courseId=${courseId})}"
                   class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-primary/30 bg-primary/10 text-primary text-sm font-label tracking-wide hover:bg-primary/20 hover:border-primary/50 transition-all">
                    <span class="material-symbols-outlined text-base">add_box</span>
                    공지사항 등록
                </a>
            </div>
        </div>

        <!-- 공지사항 목록 -->
        <div class="flex flex-col gap-3">

            <!-- 공지사항 있을 때 -->
            <div th:if="${notices != null and !#lists.isEmpty(notices)}"
                 class="flex flex-col gap-3">
                <div th:each="notice : ${notices}"
                     class="group bg-surface-container/60 backdrop-blur-xl rounded-2xl border border-outline-variant/20 p-6 hover:border-cyan-400/20 transition-all shadow-lg shadow-cyan-500/5">

                    <!-- 제목 + 작성자 + 날짜 -->
                    <div class="flex items-start justify-between gap-4 mb-3">
                        <h3 class="text-base font-headline font-bold text-on-surface"
                            th:text="${notice.noticeTitle}">공지 제목</h3>
                        <div class="flex-shrink-0 flex items-center gap-3">
                            <!-- 강사만 수정/삭제 버튼 표시 -->
                            <a sec:authorize="hasRole('INSTRUCTOR')"
                               th:href="@{/instructor/courses/{courseId}/notices/{noticeId}/edit(courseId=${courseId}, noticeId=${notice.noticeId})}"
                               class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-outline-variant/30 text-slate-400 hover:text-cyan-400 hover:border-cyan-400/30 transition-all text-xs font-label">
                                <span class="material-symbols-outlined text-sm">edit</span>
                                수정
                            </a>
                            <a sec:authorize="hasRole('INSTRUCTOR')"
                               th:href="@{/instructor/courses/{courseId}/notices/{noticeId}/delete(courseId=${courseId}, noticeId=${notice.noticeId})}"
                               class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-error/30 text-error/70 hover:text-error hover:border-error/50 transition-all text-xs font-label">
                                <span class="material-symbols-outlined text-sm">delete</span>
                                삭제
                            </a>
                        </div>
                    </div>

                    <!-- 내용 -->
                    <p class="text-sm text-slate-400 font-body mb-4 line-clamp-2"
                       th:text="${notice.noticeContent}">공지 내용</p>

                    <!-- 하단 메타 정보 -->
                    <div class="flex items-center justify-between text-xs text-slate-500 font-label border-t border-outline-variant/10 pt-3">
                        <span th:text="|작성자 : ${notice.authorName}|">작성자</span>
                        <div class="flex items-center gap-4">
                            <!-- 수정된 경우 표시 -->
                            <span th:if="${notice.updatedAt != null and notice.updatedAt != notice.createdAt}"
                                  class="text-secondary/70">
                                (수정됨) 마지막 수정일시 :
                                <span th:text="${#temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                            </span>
                            <span class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm">schedule</span>
                                <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">등록일</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 공지사항 없을 때 -->
            <div th:if="${notices == null or #lists.isEmpty(notices)}"
                 class="flex flex-col items-center justify-center py-24 text-center">
                <div class="w-16 h-16 rounded-2xl bg-outline-variant/10 border border-outline-variant/20 flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-slate-600 text-3xl">campaign</span>
                </div>
                <p class="text-slate-400 font-label tracking-wide mb-1">등록된 공지사항이 없습니다</p>
                <p class="text-slate-600 text-xs font-body mb-6">아직 이 강좌에 공지사항이 없습니다.</p>
                <a sec:authorize="hasRole('INSTRUCTOR')"
                   th:href="@{/instructor/courses/{courseId}/notices/add(courseId=${courseId})}"
                   class="flex items-center gap-2 px-5 py-2.5 rounded-lg border border-primary/30 bg-primary/10 text-primary text-sm font-label tracking-wide hover:bg-primary/20 transition-all">
                    <span class="material-symbols-outlined text-base">add_box</span>
                    첫 공지사항 등록하기
                </a>
            </div>
        </div>
    </section>
</main>

<!-- 배경 그라디언트 -->
<div class="fixed inset-0 pointer-events-none -z-10">
    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[150px]"></div>
</div>



</body>
</html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

</body>
</html>
