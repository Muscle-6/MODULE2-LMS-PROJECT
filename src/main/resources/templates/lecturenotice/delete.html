<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERADICATE SIGNAL | MODULE02 LMS</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "secondary": "#c97cff",
                        "error": "#ff716c",
                        "surface-container": "#161a21",
                        "on-surface": "#ecedf6",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image:
                    radial-gradient(circle at 50% 50%, rgba(255, 113, 108, 0.05) 0%, transparent 60%);
        }

        .danger-card {
            background: rgba(22, 26, 33, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 113, 108, 0.2);
            box-shadow: 0 0 50px rgba(255, 113, 108, 0.05);
        }

        .warning-stripes {
            background: repeating-linear-gradient(
                    45deg,
                    rgba(255, 113, 108, 0.05),
                    rgba(255, 113, 108, 0.05) 10px,
                    transparent 10px,
                    transparent 20px
            );
        }

        .signal-info {
            background: rgba(13, 17, 23, 0.8);
            border-left: 2px solid #ff716c;
        }
    </style>
</head>

<body class="min-h-screen">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-slate-950/20 backdrop-blur-md border-b border-white/5">
    <div class="flex items-center gap-6">
        <span class="text-2xl font-black tracking-tighter text-error font-headline italic">MODULE02</span>
        <div class="h-4 w-[1px] bg-white/10"></div>
        <span class="text-[10px] font-label tracking-[0.3em] text-error/60 uppercase font-black">Security Override</span>
    </div>
</header>

<main class="pt-32 px-6">
    <div class="max-w-2xl mx-auto">

        <div class="mb-10">
            <a th:href="@{/instructor/courses/{courseId}/notices(courseId=${courseId})}"
               class="group flex items-center gap-2 text-[10px] font-label text-slate-500 uppercase tracking-widest hover:text-primary transition-all">
                <span class="material-symbols-outlined text-xs group-hover:-translate-x-1 transition-transform">arrow_back</span> Return to Archive
            </a>
        </div>

        <div class="danger-card rounded-[3rem] p-10 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 warning-stripes"></div>

            <div class="relative z-10 flex flex-col items-center text-center">

                <div class="w-24 h-24 rounded-full bg-error/10 border border-error/20 flex items-center justify-center mb-8 relative">
                    <div class="absolute inset-0 rounded-full border border-error/30 animate-ping opacity-20"></div>
                    <span class="material-symbols-outlined text-error text-5xl">warning</span>
                </div>

                <h1 class="text-3xl font-headline font-black text-on-surface tracking-tighter uppercase italic mb-2">
                    Confirm <span class="text-error">Eradication?</span>
                </h1>
                <p class="text-[10px] font-label text-slate-500 uppercase tracking-[0.2em] mb-10">You are about to terminate this signal broadcast permanently.</p>

                <div class="signal-info w-full rounded-2xl p-6 text-left mb-10">
                    <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
                        <span class="text-[9px] font-label text-error uppercase font-black tracking-widest">Signal Subject</span>
                        <span class="text-[9px] font-label text-slate-600 uppercase" th:text="|Ref: #${notice.noticeId}|">#ID</span>
                    </div>
                    <h3 class="text-lg font-headline font-bold text-on-surface mb-2" th:text="${notice.noticeTitle}">공지 제목</h3>
                    <p class="text-xs font-body text-slate-500 line-clamp-2" th:text="${notice.noticeContent}">공지 내용</p>
                </div>

                <div class="flex items-center gap-4 px-6 py-3 rounded-full bg-error/5 border border-error/10 mb-8">
                    <span class="material-symbols-outlined text-error text-sm">info</span>
                    <p class="text-[9px] font-label text-error uppercase font-black tracking-widest">
                        Warning: This action cannot be reversed within the current timeline.
                    </p>
                </div>

                <div class="flex items-center gap-6 w-full">
                    <a th:href="@{/instructor/courses/{courseId}/notices(courseId=${courseId})}"
                       class="flex-1 py-5 rounded-2xl text-[10px] font-label font-black uppercase tracking-widest text-slate-500 hover:text-white hover:bg-white/5 transition-all text-center">
                        Cancel Protocol
                    </a>

                    <button id="deleteBtn"
                            type="button"
                            th:data-action="@{/instructor/courses/{courseId}/notices/{noticeId}/delete(courseId=${courseId}, noticeId=${notice.noticeId})}"
                            class="flex-[1.5] flex items-center justify-center gap-3 py-5 rounded-2xl bg-error text-slate-950 font-label text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-[0_15px_40px_rgba(255,113,108,0.25)]">
                        <span class="material-symbols-outlined text-lg">delete_forever</span>
                        Execute Eradication
                    </button>
                </div>
            </div>
        </div>

        <form id="deleteForm" method="post" style="display: none;"></form>
    </div>
</main>

<div class="fixed inset-0 pointer-events-none -z-10">
    <div class="absolute bottom-0 right-1/4 w-[600px] h-[600px] bg-error/5 rounded-full blur-[150px]"></div>
</div>

<script>
    document.getElementById('deleteBtn').addEventListener('click', function () {
        const action = this.dataset.action;
        const form = document.getElementById('deleteForm');
        form.action = action;
        form.submit();
    });
</script>

</body>
</html>
