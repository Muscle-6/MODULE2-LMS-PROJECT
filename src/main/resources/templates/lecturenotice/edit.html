<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALIBRATE BROADCAST | MODULE02 LMS</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "secondary": "#c97cff",
                        "surface-container": "#161a21",
                        "on-surface": "#ecedf6",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image:
                    radial-gradient(circle at 50% 0%, rgba(153, 247, 255, 0.05) 0%, transparent 70%),
                    linear-gradient(rgba(153, 247, 255, 0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(153, 247, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .calibration-card {
            background: rgba(22, 26, 33, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 247, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
        }

        .cy-input {
            background: rgba(13, 17, 23, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #ecedf6 !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cy-input:focus {
            border-color: #99f7ff !important;
            background: rgba(153, 247, 255, 0.03) !important;
            box-shadow: 0 0 20px rgba(153, 247, 255, 0.1) !important;
        }

        .form-label-scan {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 900;
            color: rgba(153, 247, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-label-scan::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(153, 247, 255, 0.2), transparent);
        }
    </style>
</head>

<body class="min-h-screen pb-20">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950/40 backdrop-blur-xl shadow-[0_0_20px_rgba(153,247,255,0.1)]">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-bold tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(153,247,255,0.6)] font-headline">MODULE02 LMS</span>
        <span class="hidden md:inline text-xs font-label text-slate-400 tracking-widest uppercase">우주/외계인 세계관 학습 플랫폼</span>
    </div>

    <div class="flex items-center gap-4">
        <div class="flex items-center gap-4" th:if="${loginMember == null}">
            <a th:href="@{/login}" class="text-slate-300 hover:text-cyan-300 font-label text-xs tracking-widest transition-colors">로그인</a>
            <a th:href="@{/signup}" class="bg-primary/10 border border-primary/30 text-primary px-4 py-1.5 rounded text-xs font-label tracking-widest hover:bg-primary/20 transition-all shadow-[0_0_10px_rgba(153,247,255,0.1)]">회원가입</a>
        </div>

        <div class="flex items-center gap-4" th:if="${loginMember != null}">
            <div class="text-right hidden sm:block mr-2">
                <span class="text-xs font-label tracking-widest text-cyan-400" th:text="|${loginMember.name} 님|"></span>
                <span class="text-[10px] text-slate-500 font-label tracking-tight ml-1" th:text="|(${loginMember.role})|"></span>
            </div>
            <a th:href="@{/logout}" class="flex items-center gap-1 text-slate-400 hover:text-error transition-colors text-xs font-label">
                <span class="material-symbols-outlined text-sm">power_settings_new</span> 로그아웃
            </a>
        </div>
    </div>
</header>

<main class="pt-32 px-6">
    <div class="max-w-4xl mx-auto">

        <div class="mb-12 flex items-end justify-between px-2">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <a th:href="@{/instructor/courses/{courseId}/notices(courseId=${courseId})}"
                       class="group flex items-center gap-2 text-[10px] font-label text-slate-500 uppercase tracking-widest hover:text-primary transition-all">
                        <span class="material-symbols-outlined text-xs group-hover:-translate-x-1 transition-transform">arrow_back</span> Return to Hub
                    </a>
                </div>
                <h1 class="text-4xl md:text-5xl font-headline font-black text-on-surface tracking-tighter uppercase italic">
                    Calibrate <span class="text-primary/50">Signal</span>
                </h1>
                <p class="text-[10px] font-label text-slate-500 uppercase tracking-[0.2em] mt-3">Adjusting transmission parameters for module [[${notice.noticeId}]]</p>
            </div>
            <div class="hidden md:block text-right">
                <span class="material-symbols-outlined text-primary/20 text-6xl">settings_input_antenna</span>
            </div>
        </div>

        <form th:action="@{/instructor/courses/{courseId}/notices/{noticeId}/edit(courseId=${courseId}, noticeId=${notice.noticeId})}"
              method="post" class="space-y-6">

            <div class="calibration-card rounded-[2.5rem] p-10 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-10">
                    <span class="text-[40px] font-headline font-black italic">VER 2.0</span>
                </div>

                <div class="space-y-10 relative z-10">

                    <div class="space-y-4">
                        <label class="form-label-scan">
                            <span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                            Transmission Title
                        </label>
                        <input type="text"
                               name="courseNoticeTitle"
                               class="cy-input w-full px-6 py-4 rounded-2xl text-lg font-headline font-bold focus:ring-0 outline-none"
                               th:value="${notice.noticeTitle}"
                               placeholder="Enter encrypted subject..."
                               required/>
                    </div>

                    <div class="space-y-4">
                        <label class="form-label-scan">
                            <span class="w-1.5 h-1.5 bg-secondary rounded-full"></span>
                            Detailed Instruction Data
                        </label>
                        <textarea name="courseNoticeContent"
                                  rows="12"
                                  class="cy-input w-full px-6 py-5 rounded-[2rem] text-sm font-body leading-relaxed focus:ring-0 outline-none resize-none"
                                  placeholder="Compile your orders here..."
                                  th:text="${notice.noticeContent}"
                                  required></textarea>
                    </div>

                    <div class="flex flex-col md:flex-row gap-6 pt-6 border-t border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-xs text-slate-600">history</span>
                            <span class="text-[9px] font-label text-slate-500 uppercase tracking-widest" th:text="|First Broadcast: ${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}|"></span>
                        </div>
                        <div th:if="${notice.updatedAt != null and notice.updatedAt != notice.createdAt}" class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-xs text-secondary/50">update</span>
                            <span class="text-[9px] font-label text-secondary/60 uppercase tracking-widest" th:text="|Last Calibration: ${#temporals.format(notice.updatedAt, 'yyyy.MM.dd HH:mm')}|"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-end gap-4 pt-4">
                <a th:href="@{/instructor/courses/{courseId}/notices(courseId=${courseId})}"
                   class="px-8 py-4 rounded-2xl text-[10px] font-label font-black uppercase tracking-[0.2em] text-slate-500 hover:text-white hover:bg-white/5 transition-all">
                    Abort
                </a>
                <button type="submit"
                        class="group flex items-center gap-3 px-10 py-4 rounded-2xl bg-primary text-slate-950 font-label text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-[0_15px_40px_rgba(153,247,255,0.2)]">
                    <span class="material-symbols-outlined text-lg">sync_alt</span>
                    Update Broadcast
                </button>
            </div>

        </form>
    </div>
</main>

<div class="fixed inset-0 pointer-events-none -z-10">
    <div class="absolute top-1/3 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[150px]"></div>
    <div class="absolute bottom-0 left-1/4 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>

</body>
</html>
