<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHENTICATION | MODULE02 LMS</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99f7ff",
                        "secondary": "#c97cff",
                        "error": "#ff716c",
                        "surface-container": "#161a21",
                        "surface-container-high": "#1c2028",
                        "on-surface": "#ecedf6",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14;
            color: #ecedf6;
            background-image: radial-gradient(circle at 50% 50%, rgba(153, 247, 255, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        /* 다크 모드 최적화 입력창 */
        .cyber-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 12px;
            padding: 12px 16px; /* padding-left 제거 — Tailwind pl-12로 대신 */
            color: #99f7ff !important;
            transition: all 0.3s ease;
        }
        .cyber-input:focus {
            outline: none;
            background: rgba(15, 23, 42, 0.9) !important;
            border-color: #99f7ff !important;
            box-shadow: 0 0 15px rgba(153, 247, 255, 0.1);
            color: #ffffff !important;
        }

        /* 크롬 자동완성 시 배경색 유지 */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #0f172a inset !important;
            -webkit-text-fill-color: #99f7ff !important;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>

<div class="w-full max-w-md z-10">

    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2rem] bg-primary/10 border border-primary/20 mb-6 shadow-[0_0_30px_rgba(153,247,255,0.1)] relative group">
            <div class="absolute inset-0 rounded-[2rem] bg-primary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <span class="material-symbols-outlined text-4xl text-primary relative">admin_panel_settings</span>
        </div>
        <h1 class="text-3xl font-headline font-black tracking-tighter text-white uppercase italic">
            System <span class="text-primary/60">Auth</span>
        </h1>
        <p class="text-[10px] font-label text-slate-500 tracking-[0.4em] mt-3 uppercase">Secure Terminal Access</p>
    </div>

    <div class="bg-surface-container/60 backdrop-blur-2xl border border-white/5 p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">

        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>

        <div th:if="${errorMessage} or ${param.error}" class="mb-8 p-4 rounded-xl bg-error/10 border border-error/20 flex items-start gap-3 animate-pulse">
            <span class="material-symbols-outlined text-error text-sm mt-0.5">report</span>
            <div class="text-error text-[11px] font-medium leading-relaxed uppercase tracking-tight">
                <span th:if="${errorMessage}" th:text="${errorMessage}"></span>
                <span th:if="${param.error and (param.reason == null or param.reason[0] == 'invalid')}">Invalid Access Credentials</span>
                <span th:if="${param.reason != null and param.reason[0] == 'inactive'}">Account Status: Inactive</span>
                <span th:if="${param.reason != null and param.reason[0] == 'banned'}">Account Status: Banned</span>
            </div>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6">

            <div class="space-y-2">
                <label class="text-[10px] font-label font-bold text-slate-500 uppercase tracking-widest ml-1">Operative ID</label>
                <div class="relative group flex items-center">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-base group-focus-within:text-primary transition-colors z-10 pointer-events-none">badge</span>
                    <input type="text" id="loginId" name="loginId" required
                           class="cyber-input pl-12" placeholder="Identification...">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-label font-bold text-slate-500 uppercase tracking-widest ml-1">Security Passkey</label>
                <div class="relative group flex items-center">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-base group-focus-within:text-primary transition-colors z-10 pointer-events-none">vpn_key</span>
                    <input type="password" id="password" name="password" required
                           class="cyber-input pl-12" placeholder="Passkey...">
                </div>
            </div>

            <button type="submit"
                    class="w-full py-4 mt-4 bg-primary text-slate-950 font-label font-black text-xs uppercase tracking-[0.2em] rounded-xl hover:bg-white hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_0_25px_rgba(153,247,255,0.1)] flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-sm">login</span>
                Initialize Access
            </button>
        </form>
    </div>

    <div class="mt-8 flex justify-center items-center gap-8">
        <a th:href="@{/signup}" class="text-[10px] font-label text-slate-500 uppercase tracking-widest hover:text-primary transition-all flex items-center gap-2 group">
            <span class="material-symbols-outlined text-sm group-hover:scale-110">person_add</span> Register Agent
        </a>
        <div class="w-1 h-1 rounded-full bg-slate-800"></div>
        <a th:href="@{/}" class="text-[10px] font-label text-slate-500 uppercase tracking-widest hover:text-primary transition-all flex items-center gap-2 group">
            <span class="material-symbols-outlined text-sm group-hover:scale-110">terminal</span> Main Terminal
        </a>
    </div>

</div>

</body>
</html>
