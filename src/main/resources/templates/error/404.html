<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>404 - 페이지를 찾을 수 없음</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #020617; color: #e2e8f0; }
    .wrap { width: 760px; max-width: calc(100% - 40px); margin: 100px auto; background: rgba(15,23,42,.92); border: 1px solid #334155; border-radius: 20px; padding: 40px; text-align: center; }
    .status { font-size: 72px; font-weight: 800; color: #60a5fa; margin: 0; }
    .title { font-size: 28px; margin: 12px 0 18px; }
    .message { font-size: 17px; line-height: 1.7; color: #cbd5e1; margin-bottom: 16px; }
    .path { font-size: 14px; color: #94a3b8; margin-bottom: 28px; }
    .actions a { display: inline-block; margin: 0 6px; padding: 12px 18px; border-radius: 10px; text-decoration: none; font-weight: 700; }
    .home { background: #2563eb; color: white; }
    .back { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; }
  </style>
</head>
<body>
<div class="wrap">
  <p class="status" th:text="${status}">404</p>
  <h1 class="title" th:text="${title}">존재하지 않는 좌표입니다</h1>
  <p class="message" th:text="${message}">
    요청하신 페이지 또는 데이터를 찾을 수 없습니다.
  </p>
  <p class="path" th:if="${path != null}" th:text="'요청 경로: ' + ${path}">요청 경로</p>

  <div class="actions">
    <a class="home" th:href="@{/}">메인으로 이동</a>
    <a class="back" href="javascript:history.back()">이전 페이지로 이동</a>
  </div>
</div>
</body>
</html>
