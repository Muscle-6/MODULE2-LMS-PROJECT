<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
      <html lang="ko" xmlns:th="http://www.thymeleaf.org">
      <head>
      <meta charset="UTF-8">
      <title>500 - 서버 오류</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111827; color: #f3f4f6; }
    .wrap { width: 760px; max-width: calc(100% - 40px); margin: 100px auto; background: #1f2937; border: 1px solid #374151; border-radius: 20px; padding: 40px; text-align: center; }
    .status { font-size: 72px; font-weight: 800; color: #f87171; margin: 0; }
    .title { font-size: 28px; margin: 12px 0 18px; }
    .message { font-size: 17px; line-height: 1.7; color: #d1d5db; margin-bottom: 16px; }
    .path { font-size: 14px; color: #9ca3af; margin-bottom: 28px; }
    .actions a { display: inline-block; margin: 0 6px; padding: 12px 18px; border-radius: 10px; text-decoration: none; font-weight: 700; }
    .home { background: #ef4444; color: white; }
    .back { background: #374151; color: #f3f4f6; }
  </style>
</head>
<body>
<div class="wrap">
  <p class="status" th:text="${status}">500</p>
  <h1 class="title" th:text="${title}">서버 내부 오류가 발생했습니다</h1>
  <p class="message" th:text="${message}">
    시스템 처리 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.
  </p>
  <p class="path" th:if="${path != null}" th:text="'요청 경로: ' + ${path}">요청 경로</p>

  <div class="actions">
    <a class="home" th:href="@{/}">메인으로 이동</a>
    <a class="back" href="javascript:history.back()">이전 페이지로 이동</a>
  </div>
</div>
</body>
</html></title>
</head>
<body>

</body>
</html>
