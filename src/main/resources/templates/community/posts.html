<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>대륙 게시판 목록</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b1020; color: #f5f7ff; }
    .container { width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .board-table { width: 100%; border-collapse: collapse; background: #121a35; border-radius: 18px; overflow: hidden; }
    .board-table th, .board-table td { padding: 15px; text-align: left; border-bottom: 1px solid #1a2447; }
    .board-table th { background: #1d295f; color: #7ee0ff; font-weight: bold; }
    .board-table tr:hover { background: #1a2447; cursor: pointer; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; background: #5f7cff; color: white; text-decoration: none; font-weight: bold; }
    .btn-write { background: #ffb648; color: #1d1d1d; }
    .empty-msg { text-align: center; padding: 50px; color: #b8c1e7; }
    a { color: inherit; text-decoration: none; } /* 링크 밑줄 제거 */
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>대륙 <span th:text="${continentId}">1</span> 게시판</h1>
    <a th:href="@{/}" class="btn">← 메인으로</a>
  </div>

  <div class="section">
    <table class="board-table">
      <thead>
      <tr>
        <th style="width: 10%;">번호</th>
        <th style="width: 60%;">제목</th>
        <th style="width: 30%;">작성자</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="post : ${posts}">
        <td th:text="${post.postId}">1</td>
        <td>
          <a th:href="@{/posts/{id}(id=${post.postId})}" th:text="${post.title}">게시글 제목</a>
        </td>
        <td th:text="${post.authorName}">작성자 이름</td>
      </tr>

      <tr th:if="${#lists.isEmpty(posts)}">
        <td colspan="3" class="empty-msg">게시글이 존재하지 않습니다.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <div style="margin-top: 20px; text-align: right;">
    <a th:href="@{/continents/{id}/posts/new(id=${continentId})}" class="btn btn-write">새 글 쓰기</a>  </div>
</div>
</body>
</html>
