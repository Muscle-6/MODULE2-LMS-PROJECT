<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTINENT BOARD | MODULE02 LMS</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#99f7ff", secondary: "#c97cff", error: "#ff716c",
            surface: "#161a21", "surface-high": "#1c2028", outline: "#45484f"
          },
          fontFamily: { headline: ["Space Grotesk"], body: ["Inter"], label: ["Space Grotesk"] }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #ecedf6; overflow-x: hidden; }
    .material-symbols-outlined { vertical-align: middle; }
    /* 행 호버 시 발광 효과 */
    .board-row:hover { box-shadow: inset 0 0 20px rgba(153, 247, 255, 0.05); }
  </style>
</head>

<body class="min-h-screen pt-24 px-10 pb-16">

<div class="max-w-5xl mx-auto">
  <div class="flex justify-between items-end mb-12">
    <div class="space-y-2">
      <div class="flex items-center gap-2 text-primary/60 text-[10px] font-label font-bold tracking-[0.3em] uppercase">
        <span class="w-8 h-[1px] bg-primary/30"></span>
        Exploration Logs
      </div>
      <h1 class="text-4xl font-headline font-black text-white tracking-tighter">
        CONTINENT <span class="text-primary" th:text="${continentId}">1</span>
        <span class="text-slate-700 ml-2">/ ARCHIVE</span>
      </h1>
    </div>
    <a th:href="@{/}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-white/10 bg-white/5 text-slate-400 text-xs font-label font-bold uppercase tracking-widest hover:text-white hover:bg-white/10 transition-all">
      <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Orbit
    </a>
  </div>

  <div class="bg-surface/40 backdrop-blur-xl border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl">
    <table class="w-full border-collapse text-left">
      <thead>
      <tr class="border-b border-white/5 bg-white/[0.02]">
        <th class="px-8 py-5 text-[10px] font-label font-black text-slate-500 uppercase tracking-[0.2em]">Timestamp</th>
        <th class="px-8 py-5 text-[10px] font-label font-black text-slate-500 uppercase tracking-[0.2em]">Subject</th>
        <th class="px-8 py-5 text-[10px] font-label font-black text-slate-500 uppercase tracking-[0.2em]">Operative</th>
      </tr>
      </thead>
      <tbody class="divide-y divide-white/[0.03]">
      <tr th:each="post : ${posts}"
          th:onclick="|location.href='/posts/${post.postId}'|"
          class="board-row group cursor-pointer transition-all hover:bg-white/[0.03]">

        <td class="px-8 py-6 whitespace-nowrap">
                        <span th:if="${post.postIsNotice}" class="flex items-center gap-2 text-secondary font-black text-[10px] tracking-tighter italic">
                            <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span> SYSTEM NOTICE
                        </span>
          <span th:unless="${post.postIsNotice}" class="text-slate-500 font-label text-xs tracking-tighter"
                th:text="${post.createdAt}">2026.04.17</span>
        </td>

        <td class="px-8 py-6">
          <div class="flex items-center gap-3">
                            <span th:if="${post.postIsNotice}"
                                  class="px-2 py-0.5 rounded bg-secondary/10 border border-secondary/20 text-secondary text-[9px] font-black tracking-widest uppercase">TOP</span>
            <a th:href="@{/posts/{id}(id=${post.postId})}"
               th:text="${post.title}"
               class="text-sm font-medium tracking-tight group-hover:text-primary transition-colors"
               th:classappend="${post.postIsNotice} ? 'text-secondary font-bold' : 'text-slate-200'">
              게시글 제목
            </a>
          </div>
        </td>

        <td class="px-8 py-6">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded-lg flex items-center justify-center border transition-all"
                 th:classappend="${post.authorRank == 'REPTILIAN'} ? 'bg-amber-400/10 border-amber-400/30' : 'bg-white/5 border-white/10'">
            <span class="material-symbols-outlined text-[14px]"
                  th:classappend="${post.authorRank == 'REPTILIAN'} ? 'text-amber-400' : 'text-slate-500'"
                  th:text="${post.authorRank == 'REPTILIAN'} ? 'military_tech' : 'person'">person</span>
            </div>

            <div class="flex flex-col">
              <div class="flex items-center gap-2">
                <span class="text-xs font-label font-bold text-slate-400 group-hover:text-slate-200 transition-colors"
                      th:text="${post.authorName}">요원명</span>

                <span th:if="${post.authorRankComment != null}" class="flex items-center">
                    <th:block th:if="${post.authorRank == 'REPTILIAN'}">
                        <strong class="text-[9px] font-black uppercase tracking-tighter"
                                style="color: #ffffff; text-shadow: 0 0 8px #ffd700, 0 0 15px #ffd700; margin-left: 2px;"
                                th:text="'[' + ${post.authorRankComment} + ']'"></strong>
                    </th:block>

                    <th:block th:if="${post.authorRank != 'REPTILIAN'}">
                        <span class="text-[9px] font-bold text-slate-500 italic opacity-80"
                              style="margin-left: 2px;"
                              th:text="'(' + ${post.authorRankComment} + ')'"></span>
                    </th:block>
                </span>
              </div>
              <p class="text-[8px] font-label text-slate-600 uppercase tracking-widest leading-none mt-0.5"
                 th:text="${post.authorRank != null ? post.authorRank : 'AGENT'}">RANK</p>
            </div>
          </div>
        </td>
      </tr>

      <tr th:if="${#lists.isEmpty(posts)}">
        <td colspan="3" class="px-8 py-32 text-center">
          <span class="material-symbols-outlined text-5xl text-slate-800 mb-4 block">folder_off</span>
          <p class="text-[10px] font-label text-slate-600 uppercase tracking-[0.3em]">No Data Streams Detected</p>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-8 flex justify-end">
    <a th:href="@{/continents/{id}/posts/new(id=${continentId})}"
       class="group flex items-center gap-3 px-8 py-4 rounded-2xl bg-primary text-slate-950 text-[11px] font-black uppercase tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-[0_10px_40px_rgba(153,247,255,0.2)]">
      <span class="material-symbols-outlined text-lg">edit_square</span>
      Establish New Log
    </a>
  </div>
</div>

</body>
</html>
