<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>대륙 게시판 목록</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b1020; color: #f5f7ff; }
    .container { width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

    /* 게시판 테이블 스타일 */
    .board-table { width: 100%; border-collapse: collapse; background: #121a35; border-radius: 18px; overflow: hidden; }
    .board-table th, .board-table td { padding: 15px; text-align: left; border-bottom: 1px solid #1a2447; }
    .board-table th { background: #1d295f; color: #7ee0ff; font-weight: bold; }
    .board-table tr:hover { background: #1a2447; cursor: pointer; }

    /* 버튼 스타일 */
    .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; background: #5f7cff; color: white; text-decoration: none; font-weight: bold; border: none; }
    .btn-write { background: #ffb648; color: #1d1d1d; } /* 글쓰기 버튼은 좀 더 튀게! */

    .empty-msg { text-align: center; padding: 50px; color: #b8c1e7; }
    .notice-badge { background: #ffb648; color: #1d1d1d; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>대륙 [[${continentId}]] 게시판</h1>
    <a th:href="@{/}" class="btn">← 메인으로</a>
  </div>

  <div class="section">
    <table class="board-table">
      <thead>
      <tr>
        <th style="width: 10%;">번호</th>
        <th style="width: 50%;">제목</th>
        <th style="width: 15%;">작성자</th>
        <th style="width: 25%;">작성일</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td>1</td>
        <td><span class="notice-badge">공지</span> 첫 게시글입니다. (샘플)</td>
        <td>운영자</td>
        <td>2026-04-13</td>
      </tr>
      <tr th:if="${continentId == null}">
        <td colspan="4" class="empty-msg">게시글이 존재하지 않습니다.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <div style="margin-top: 20px; text-align: right;">
    <a href="#" class="btn btn-write">새 글 쓰기</a>
  </div>
</div>
</body>
</html>
