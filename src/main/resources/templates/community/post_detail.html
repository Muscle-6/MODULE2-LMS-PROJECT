<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA RETRIEVAL | MODULE02 LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300" rel="stylesheet" />

    <style>
        :root {
            --primary: #99f7ff;
            --bg-dark: #0b0e14;
            --surface: #161a21;
            --error: #ff716c;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #ecedf6;
            background-image: radial-gradient(circle at 50% 50%, rgba(153, 247, 255, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 100px 20px; }

        .post-card {
            background: rgba(22, 26, 33, 0.6);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid rgba(153, 247, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .post-header { border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; padding-bottom: 30px; }
        .post-title { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; color: #fff; margin: 0 0 15px 0; letter-spacing: -0.02em; }
        .post-info { color: #94a3b8; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 15px; }

        .rank-reptilian { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); font-weight: bold; }
        .rank-normal { color: #64748b; font-style: italic; }

        .post-content { line-height: 1.8; font-size: 17px; min-height: 350px; white-space: pre-wrap; color: #cbd5e1; }

        .btn-area { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 12px; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif; text-transform: uppercase;
        }
        .btn-primary { background: rgba(153, 247, 255, 0.1); color: var(--primary); border-color: rgba(153, 247, 255, 0.2); }
        .btn-primary:hover { background: var(--primary); color: #000; }
        .btn-list { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .btn-list:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-delete { background: rgba(255, 113, 108, 0.1); color: var(--error); border-color: rgba(255, 113, 108, 0.2); }
        .btn-delete:hover { background: var(--error); color: #fff; }

        /* 댓글 섹션 */
        .comment-section { margin-top: 80px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 50px; }
        .comment-item { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }

        textarea {
            width: 100%; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; background: rgba(0,0,0,0.2);
            color: #fff; padding: 20px; box-sizing: border-box; transition: all 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(153, 247, 255, 0.1); }

        .error-box { padding: 15px; background: rgba(255, 113, 108, 0.1); border: 1px solid var(--error); color: var(--error); border-radius: 12px; margin-bottom: 20px; font-size: 14px; }

        /* 삭제 확인 모달 스타일 */
        #deleteModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 10, 15, 0.8);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid rgba(255, 113, 108, 0.3);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 0 50px rgba(255, 113, 108, 0.15);
            text-align: center;
            animation: modalSlideUp 0.3s ease-out;
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 신고 모달 전용 스타일 */
        #reportModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 101; /* 삭제 모달보다 위에 */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .report-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(153, 247, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .report-select:focus {
            border-color: var(--primary);
        }

    </style>
</head>

<body>
<div class="container">
    <div class="post-card">
        <div class="post-header">
            <h1 class="post-title" th:text="${post.title}">제목</h1>
            <div class="post-info">
                <span>
                    <span class="material-symbols-outlined" style="font-size: 16px;">person</span>
                    <th:block th:text="${post.authorName}">홍길동</th:block>

                    <span th:if="${post.authorRankComment != null}">
                        <th:block th:if="${post.authorRank == 'REPTILIAN'}">
                            <span class="rank-reptilian" th:text="' [' + ${post.authorRankComment} + ']'"></span>
                        </th:block>
                        <th:block th:if="${post.authorRank != 'REPTILIAN'}">
                            <span class="rank-normal" th:text="' (' + ${post.authorRankComment} + ')'"></span>
                        </th:block>
                    </span>
                </span>
                <span style="opacity: 0.3;">|</span>
                <span>
                    <span class="material-symbols-outlined" style="font-size: 16px;">public</span>
                    <th:block th:text="${post.continentName}">Java Continent</th:block>
                </span>
            </div>
        </div>
        <div class="post-content" th:text="${post.content}">내용</div>
    </div>

    <div class="btn-area">
        <a th:href="@{/continents/{id}/posts(id=${post.continentId})}" class="btn btn-list">
            <span class="material-symbols-outlined">west</span> 목록으로
        </a>

        <div class="btn-group">
            <th:block th:if="${currentUserId != null and currentUserId == post.memberId}">
                <a th:href="@{/continents/posts/edit/{id}(id=${post.postId})}" class="btn btn-primary">수정하기</a>
                <form id="deleteForm" th:action="@{/posts/delete/{id}(id=${post.postId})}" method="post" style="margin: 0;">
                    <button type="button" class="btn btn-delete" onclick="showDeleteModal('post')">삭제하기</button>
                </form>
            </th:block>

            <button th:if="${currentUserId != null and currentUserId != post.memberId}"
                    type="button" class="btn btn-list"
                    th:onclick="openReportModal('CONTINENT_POST', [[${post.postId}]])">
                <span class="material-symbols-outlined" style="font-size: 18px;">report</span> 신고하기
            </button>
        </div>
    </div>

    <div class="comment-section" th:if="${!post.postIsNotice}">
        <h3 style="font-family: 'Space Grotesk'; font-size: 20px; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
            <span class="material-symbols-outlined">forum</span> COMMUNICATIONS LOG
        </h3>

        <div th:if="${errorMessage}" class="error-box" th:text="${errorMessage}">에러 메시지</div>

        <div class="comment-write" style="margin-bottom: 50px;">
            <form th:action="@{/posts/{postId}/comments(postId=${post.postId})}" th:object="${commentRequestDTO}" method="post">
                <input type="hidden" th:name="_csrf" th:value="${_csrf?.token}" />
                <textarea th:field="*{content}" required placeholder="추가 데이터를 입력하십시오..."></textarea>
                <div style="text-align: right; margin-top: 15px;">
                    <button type="submit" class="btn btn-primary" style="padding: 12px 40px;">데이터 전송</button>
                </div>
            </form>
        </div>

        <div class="comment-list">
            <div th:each="comment : ${comments}" class="comment-item">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <strong style="color: var(--primary); font-family: 'Space Grotesk'; letter-spacing: 0.05em;" th:text="${comment.memberName}">작성자</strong>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <button th:if="${currentUserId != null and currentUserId != comment.memberId.toString()}" type="button" style="background: none; border: none; color: #64748b; cursor: pointer; font-size: 11px; text-transform: uppercase;" th:onclick="openReportModal('CONTINENT_COMMENT', [[${comment.commentId}]])">Flag</button>

                        <form th:if="${currentUserId != null and currentUserId == comment.memberId.toString()}"
                              th:id="'deleteCommentForm-' + ${comment.commentId}"
                              th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${post.postId}, commentId=${comment.commentId})}"
                              method="post">
                            <button type="button" style="background: none; border: none; color: var(--error); cursor: pointer; font-size: 11px; text-transform: uppercase;"
                                    th:onclick="showDeleteModal('comment', [[${comment.commentId}]])">Purge</button>
                        </form>
                    </div>
                </div>
                <p style="color: #94a3b8; line-height: 1.6; margin: 0;" th:text="${comment.content}">댓글 내용</p>
            </div>
        </div>
    </div> <div id="deleteModal" style="display: none;">
    <div class="modal-overlay" onclick="closeDeleteModal()"></div>
    <div class="modal-content">
        <div style="width: 60px; height: 60px; background: rgba(255, 113, 108, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <span class="material-symbols-outlined" style="color: var(--error); font-size: 32px;">warning</span>
        </div>
        <h3 style="font-family: 'Space Grotesk'; font-size: 20px; color: #fff; margin-bottom: 12px;">데이터 영구 소거</h3>
        <p style="color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 30px;">
            이 작업은 되돌릴 수 없습니다.<br>선택한 인텔리전스 데이터를 서버에서 영구히 삭제하시겠습니까?
        </p>
        <div style="display: flex; gap: 12px;">
            <button onclick="closeDeleteModal()" class="btn btn-list" style="flex: 1; justify-content: center;">취소</button>
            <button id="confirmDeleteBtn" class="btn btn-delete" style="flex: 1; justify-content: center;">소거 승인</button>
        </div>
    </div>
</div>
</div>
    <div class="comment-section" th:if="${post.postIsNotice}" style="text-align: center;">
        <div style="background: rgba(153, 247, 255, 0.05); padding: 30px; border-radius: 20px; color: var(--primary); border: 1px dashed rgba(153, 247, 255, 0.3); font-size: 14px; letter-spacing: 0.1em;">
            <span class="material-symbols-outlined" style="display: block; margin-bottom: 10px; font-size: 32px;">lock</span>
            RESTRICTED AREA: 공지사항에는 댓글을 작성할 수 없습니다.
        </div>
    </div>

<div id="reportModal">
    <div class="modal-overlay" onclick="closeReportModal()"></div>
    <div class="modal-content" style="border-color: rgba(153, 247, 255, 0.3); box-shadow: 0 0 50px rgba(153, 247, 255, 0.1);">
        <div style="width: 60px; height: 60px; background: rgba(153, 247, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <span class="material-symbols-outlined" style="color: var(--primary); font-size: 32px;">campaign</span>
        </div>
        <h3 style="font-family: 'Space Grotesk'; font-size: 20px; color: #fff; margin-bottom: 8px;">위험 보고서 작성</h3>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 20px; letter-spacing: 0.05em;">REPORTING ANOMALY TO HEADQUARTERS</p>

        <div style="text-align: left; margin-bottom: 25px;">
            <label style="font-size: 11px; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block;">사유 선택</label>
            <select id="reportReasonSelect" class="report-select">
                <option value="비속어 및 욕설">비속어 및 욕설</option>
                <option value="부적절한 컨텐츠">부적절한 컨텐츠</option>
                <option value="스팸 및 도배">스팸 및 도배</option>
                <option value="기타">기타 사유 (직접 입력)</option>
            </select>

            <textarea id="reportReasonDirect" placeholder="상세 내용을 입력하십시오..."
                      style="height: 80px; font-size: 13px; display: none;"></textarea>
        </div>

        <div style="display: flex; gap: 12px;">
            <button onclick="closeReportModal()" class="btn btn-list" style="flex: 1; justify-content: center;">취소</button>
            <button onclick="submitReportProtocol()" class="btn btn-primary" style="flex: 1; justify-content: center;">보고 전송</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let currentReportData = { targetType: '', targetNo: '' };

    // 기존 버튼의 onclick="openReportModal(...)"은 그대로 두셔도 됩니다.
    function openReportModal(targetType, targetNo) {
        currentReportData.targetType = targetType;
        currentReportData.targetNo = targetNo;

        document.getElementById('reportModal').style.display = 'flex';
        document.getElementById('reportReasonDirect').style.display = 'none';
        document.getElementById('reportReasonSelect').value = '비속어 및 욕설';
    }

    function closeReportModal() {
        document.getElementById('reportModal').style.display = 'none';
    }

    // 셀렉트 박스 변경 감지 (기타 선택 시 텍스트 영역 표시)
    document.getElementById('reportReasonSelect').addEventListener('change', function(e) {
        const directInput = document.getElementById('reportReasonDirect');
        directInput.style.display = (e.target.value === '기타') ? 'block' : 'none';
    });

    function submitReportProtocol() {
        const selectVal = document.getElementById('reportReasonSelect').value;
        const directVal = document.getElementById('reportReasonDirect').value;
        const finalReason = (selectVal === '기타') ? directVal : selectVal;

        if (!finalReason || finalReason.trim() === "") {
            alert("보고 사유를 입력하십시오.");
            return;
        }

        const token = document.querySelector('input[name="_csrf"]')?.value;

        fetch('/api/reports', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': token },
            body: JSON.stringify({
                targetType: currentReportData.targetType,
                targetNo: currentReportData.targetNo,
                reason: finalReason
            })
        })
            .then(response => {
                if (response.ok) {
                    alert("본부에 위험 보고가 성공적으로 전송되었습니다.");
                    closeReportModal();
                } else {
                    alert("전송 실패. 통신 상태를 확인하십시오.");
                }
            })
            .catch(err => alert("시스템 오류 발생."));
    }
    let formToSubmit = null;

    function showDeleteModal(type, commentId) {
        const modal = document.getElementById('deleteModal');
        modal.style.display = 'flex';

        if(type === 'post') {
            // 게시글 삭제 폼 할당
            formToSubmit = document.getElementById('deleteForm');
        } else if(type === 'comment') {
            // 전달받은 commentId를 사용하여 해당 댓글의 폼을 할당
            formToSubmit = document.getElementById('deleteCommentForm-' + commentId);
        }
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
        formToSubmit = null;
    }

    // 승인 버튼 클릭 시 실제 Form Submit
    document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
        if (formToSubmit) {
            formToSubmit.submit();
        }
    });

</script>
</body>
</html>
