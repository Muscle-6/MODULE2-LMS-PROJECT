<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세보기</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1020;
            color: #f5f7ff;
        }

        .container {
            width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .post-card {
            background: #121a35;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .post-header {
            border-bottom: 1px solid #1a2447;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }

        .post-title {
            font-size: 28px;
            color: #7ee0ff;
            margin: 0 0 10px 0;
        }

        .post-info {
            color: #b8c1e7;
            font-size: 14px;
        }

        .post-content {
            line-height: 1.8;
            font-size: 16px;
            min-height: 300px;
            white-space: pre-wrap;
        }

        .btn-area {
            margin-top: 30px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 8px;
            background: #5f7cff;
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn-list {
            background: #1d295f;
        }

        .btn-delete {
            background: #ff5f5f;
        }

        /* 삭제 버튼 전용 빨간색 */
    </style>
</head>
<body>
<div class="container">
    <div class="post-card">
        <div class="post-header">
            <h1 class="post-title" th:text="${post.title}">제목이 들어가는 자리</h1>
            <div class="post-info">
                작성자: <span th:text="${post.memberId}">아이디가 나올 자리</span> |
                대륙 번호: <span th:text="${post.continentId}">1</span>
            </div>
        </div>

        <div class="post-content" th:text="${post.content}">
            내용이 들어가는 자리입니다.
        </div>
    </div>

    <div class="btn-area">
        <a th:href="@{/continents/{id}/posts(id=${post.continentId})}" class="btn btn-list">목록으로</a>

        <th:block th:if="${currentUserId != null and currentUserId == post.memberId}">
            <a th:href="@{/continents/posts/edit/{id}(id=${post.postId})}" class="btn">수정하기</a>

            <form th:action="@{/posts/delete/{id}(id=${post.postId})}" method="post"
                  onsubmit="return confirm('진짜 삭제하시겠습니까?');" style="margin: 0;">
                <button type="submit" class="btn btn-delete">삭제하기</button>
            </form>
        </th:block>
    </div>
</div>

<div class="comment-container" style="margin-top: 50px; border-top: 1px solid #3d4450; padding-top: 30px;">
    <h3 style="color: #7ee0ff; margin-bottom: 20px;">💬 댓글</h3>

    <div class="comment-write" style="margin-bottom: 40px;">
        <form th:action="@{/posts/{postId}/comments(postId=${post.postId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <textarea name="content" required placeholder="따뜻한 댓글을 남겨주세요." ...
                      style="width: 100%; height: 100px; background: #121a35; color: white; border: 1px solid #3d4450; border-radius: 10px; padding: 15px; resize: none;"></textarea>
            <div style="text-align: right; margin-top: 10px;">
                <button type="submit" class="btn btn-primary"
                        style="background-color: #5d7cff; border: none; padding: 10px 20px; border-radius: 5px; color: white; cursor: pointer;">
                    댓글 등록
                </button>
            </div>
        </form>
    </div>

    <div th:if="${post.title.contains('[공지]')}"
         style="background: #1e1e2d; padding: 15px; border-radius: 10px; color: #ff5f5f; margin-bottom: 30px; text-align: center;">
        📢 공지사항에는 댓글을 작성할 수 없습니다.
    </div>

    <div class="comment-list">
        <div th:each="comment : ${comments}"
             style="background: #121a35; padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #1a2447;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong style="color: #7ee0ff;" th:text="${comment.memberName}">작성자</strong>

                <form th:if="${currentUserId != null and currentUserId == comment.memberId.toString()}"
                      th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${post.postId}, commentId=${comment.commentId})}"
                      method="post" onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
                    <button type="submit"
                            style="background: none; border: none; color: #ff5f5f; cursor: pointer; font-size: 12px;">삭제
                    </button>
                </form>
            </div>
            <p style="color: #e0e0e0; line-height: 1.5; white-space: pre-wrap;" th:text="${comment.content}">댓글 내용이
                들어갑니다.</p>
        </div>

        <div th:if="${#lists.isEmpty(comments)}" style="text-align: center; color: #666; padding: 30px;">
            첫 번째 댓글을 남겨보세요!
        </div>
    </div>
</div>
</body>
</html>
